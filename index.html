<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <title>نظام الملاحة الهندسي برو | Tracking Precision Pro</title>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #00d1b2;
            --secondary: #3273dc;
            --warning: #FFD700;
            /* اللون الأصفر للنطاق الجديد */
            --danger: #ff3860;
            --glass: rgba(10, 10, 22, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --safe-t: env(safe-area-inset-top, 0px);
            --safe-b: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            background: #000;
            color: white;
            letter-spacing: -0.2px;
        }

        /* Mission Critical HUD - شريط المعلومات العلوي */
        #hud-top {
            position: fixed;
            top: calc(15px + var(--safe-t));
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 96%;
            max-width: 1200px;
        }

        @media (min-width: 768px) {
            #hud-top {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1024px) {
            #hud-top {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .hud-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }

        .hud-card i {
            width: 22px;
            height: 22px;
            color: var(--primary);
        }

        .val-text {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .val-lbl {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .val-main {
            font-size: 16px;
            font-weight: 900;
            color: #fff;
            line-height: 1.3;
        }

        .val-unit {
            font-size: 11px;
            opacity: 0.6;
            margin-right: 4px;
            font-weight: 600;
        }

        /* الرادار الجانبي */
        #radar-panel {
            position: fixed;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (max-width: 1023px) {
            #radar-panel {
                display: none;
            }
        }

        .radar-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            width: 180px;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* أزرار التحكم السفلية */
        #hud-controls {
            position: fixed;
            bottom: calc(25px + var(--safe-b));
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            display: flex;
            gap: 12px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            padding: 10px 15px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
        }

        .btn-hub {
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            white-space: nowrap;
        }

        #btn-start {
            background: linear-gradient(135deg, #00d1b2, #00a891);
        }

        #btn-map-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
        }

        .btn-hub:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .btn-hub span {
                display: none;
            }

            .btn-hub {
                padding: 14px 18px;
            }
        }

        #map {
            height: 100vh;
            width: 100vw;
            background: #000;
        }

        /* نافذة التنبيهات */
        #backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            backdrop-filter: blur(12px);
        }

        .lux-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 88%;
            max-width: 440px;
            background: linear-gradient(160deg, #1a1a2e, #0f0f1a);
            padding: 40px;
            border-radius: 35px;
            z-index: 2001;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9);
        }

        /* وميض التحذير */
        #vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1500;
            transition: 0.5s;
        }

        .is-red-alert #vignette {
            animation: redVignette 2s infinite ease-in-out;
        }

        .is-yellow-alert #vignette {
            animation: yellowVignette 2s infinite ease-in-out;
        }

        @keyframes redVignette {
            0% { box-shadow: inset 0 0 50px rgba(255, 56, 96, 0); }
            50% { box-shadow: inset 0 0 150px rgba(255, 56, 96, 0.4); }
            100% { box-shadow: inset 0 0 50px rgba(255, 56, 96, 0); }
        }

        @keyframes yellowVignette {
            0% { box-shadow: inset 0 0 50px rgba(255, 215, 0, 0); }
            50% { box-shadow: inset 0 0 150px rgba(255, 215, 0, 0.4); }
            100% { box-shadow: inset 0 0 50px rgba(255, 215, 0, 0); }
        }

        /* النقطة النابضة (السيارة) */
        .pure-html-marker {
            background: transparent;
            border: none;
        }

        .user-dot {
            --dot-color: #00d1b2;
            width: 18px;
            height: 18px;
            background: #fff;
            border: 4px solid var(--dot-color);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--dot-color);
            position: relative;
            transition: all 0.4s ease;
        }

        .user-dot::after {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            background: var(--dot-color);
            opacity: 0.4;
            animation: scanPing 1.8s infinite;
            transition: background 0.4s ease;
        }

        @keyframes scanPing {
            from {
                transform: scale(0.5);
                opacity: 1;
            }

            to {
                transform: scale(3.5);
                opacity: 0;
            }
        }

        /* البوصلة */
        #compass-rose {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 60px;
            height: 60px;
            z-index: 1000;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 767px) {
            #compass-rose {
                bottom: 100px;
            }
        }

        /* أسماء المناطق المطبوعة على الخريطة */
        .zone-name-label {
            width: 0 !important;
            height: 0 !important;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none !important;
        }

        .zone-label-content {
            position: absolute;
            transform: translate(-50%, -50%);
            background: rgba(16, 16, 30, 0.85);
            color: #fff;
            padding: 4px 12px;
            border-radius: 8px;
            border-bottom: 2px solid;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            font-weight: 800;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
        }

        /* تنبيه الهود العلوي */
        #hud-notification {
            position: fixed;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            width: 90%;
            max-width: 500px;
            background: linear-gradient(135deg, #FFD700, #F57C00);
            color: #000;
            padding: 16px 24px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-weight: 900;
            border: 2px solid rgba(255,255,255,0.4);
            pointer-events: none;
        }
        #hud-notification.is-active {
            top: 20px;
        }
        #hud-notification i {
            width: 28px;
            height: 28px;
        }
    </style>
</head>

<body id="main-body">

    <div id="hud-top">
        <div class="hud-card">
            <div class="val-icon"><i data-lucide="zap"></i></div>
            <div class="val-text">
                <span class="val-lbl">السرعة الفورية</span>
                <div class="val-group"><span id="speed" class="val-main">0</span><span class="val-unit">كم/س</span>
                </div>
            </div>
        </div>
        <div class="hud-card">
            <div class="val-icon"><i data-lucide="map-pin"></i></div>
            <div class="val-text">
                <span class="val-lbl">إحداثيات الموقع</span>
                <span id="coords-display" class="val-main" style="font-size: 14px; direction: ltr;">---</span>
            </div>
        </div>
        <div class="hud-card" id="card-zone">
            <div class="val-icon"><i data-lucide="shield"></i></div>
            <div class="val-text">
                <span class="val-lbl">الحالة التنظيمية</span>
                <span id="zone-check" class="val-main" style="color: var(--primary)">نطاق آمن</span>
            </div>
        </div>
        <div class="hud-card">
            <div class="val-icon" id="gps-icon"><i data-lucide="satellite"></i></div>
            <div class="val-text">
                <span class="val-lbl">دقة الإشارة</span>
                <div class="val-group"><span id="gps-status" class="val-main"
                        style="color:var(--danger); font-size:14px;">غير متصل</span> <span id="gps-acc"
                        class="val-unit"></span></div>
            </div>
        </div>
        <div class="hud-card">
            <div class="val-icon"><i data-lucide="compass"></i></div>
            <div class="val-text">
                <span class="val-lbl">الاتجاه</span>
                <span id="heading" class="val-main">---</span>
            </div>
        </div>
    </div>

    <div id="radar-panel">
        <div class="radar-card">
            <span class="val-lbl">🚨 أقرب نطاق</span>
            <div id="radar-name" style="font-size: 14px; font-weight: 700; color: #fff; margin: 8px 0;">--</div>
            <div id="radar-dist" style="font-size: 26px; font-weight: 900; color: var(--warning);">0.00</div>
            <span class="val-unit">كيلومتر</span>
        </div>
    </div>

    <div id="compass-rose" id="rose-wrap">
        <i data-lucide="navigation-2" style="color: var(--primary); width: 30px; height: 30px;" id="compass-arrow"></i>
    </div>

    <div id="hud-controls">
        <button id="btn-start" class="btn-hub"><i data-lucide="play-circle"></i><span>تفعيل التتبع</span></button>
        <button id="btn-map-toggle" class="btn-hub"><i data-lucide="layers"></i><span>تغيير الخريطة</span></button>
    </div>

    <div id="vignette"></div>
    <div id="backdrop" onclick="closeAlert()"></div>

    <div id="hud-notification">
        <i data-lucide="bell-ring"></i>
        <div id="hud-notif-body">
            <div style="font-size: 11px; opacity: 0.7; text-transform: uppercase;">تنبيه اقتراب</div>
            <div id="hud-notif-msg" style="font-size: 15px;"></div>
        </div>
    </div>

    <div id="lux-modal" class="lux-modal">
        <div style="font-size: 60px; margin-bottom: 20px;" id="alert-ico">⚠️</div>
        <h3 id="alert-title" style="font-size: 26px; font-weight: 900; margin-bottom: 12px; color:#fff;">تنبيه تنظيمي
        </h3>
        <p id="alert-msg" style="font-size: 16px; opacity: 0.9; line-height: 1.7; margin-bottom: 30px;"></p>
        <button class="btn-hub" style="background:#fff; color:#000; width:100%; justify-content:center;"
            onclick="closeAlert()">علم، سألتزم</button>
    </div>

                    icon: L.divIcon({
                        className: 'zone-name-label',
                        html: `<div class="zone-label-content" style="border-bottom-color: ${z.color};">${z.name}</div>`
                    }),
                    interactive: false
                }).addTo(zonesLayer);
            } catch (e) { }
        });

        // النقطة النابضة لتمثيل سيارة المستخدم
        function getMarkerIcon(colorCode) {
            return L.divIcon({
                className: 'pure-html-marker',
                html: `<div class="user-dot" style="--dot-color: ${colorCode};"></div>`,
                iconSize: [22, 22],
                iconAnchor: [11, 11]
            });
        }

        // متغيرات التتبع
        let wakeLock = null;
        let isTracking = false;
        let lastZ = null;
        let lastAlertLocation = null;
        let audioInited = false;
        let watchId = null;
        let lastProximityKm = -1;
        let alertNotifTimeout = null;

        // خوارزمية منع قفل الشاشة القوية
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) { }
            }
        }
        document.addEventListener('visibilitychange', async () => {
            if (isTracking && wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        function initAudio() {
            if (!audioInited) { const c = new (window.AudioContext || window.webkitAudioContext)(); c.resume(); audioInited = true; }
        }

        function playBell(type = 'info') {
            try {
                const c = new (window.AudioContext || window.webkitAudioContext)();
                const m = c.createGain(); m.connect(c.destination); m.gain.setValueAtTime(0.2, c.currentTime);
                if (type === 'danger') {
                    const o = c.createOscillator(); o.connect(m); o.type = 'sine'; o.frequency.setValueAtTime(300, c.currentTime);
                    o.frequency.exponentialRampToValueAtTime(150, c.currentTime + 1); o.start(); o.stop(c.currentTime + 1);
                } else if (type === 'alarm') {
                    // صوت تنبيه "مزعج" عالي التردد ونبضي 
                    for (let i = 0; i < 5; i++) {
                        const o = c.createOscillator(); const g = c.createGain(); 
                        o.connect(g).connect(m); o.type = 'sawtooth';
                        o.frequency.setValueAtTime(880, c.currentTime + i * 0.4);
                        g.gain.setValueAtTime(0.3, c.currentTime + i * 0.4);
                        g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + i * 0.4 + 0.3);
                        o.start(c.currentTime + i * 0.4); o.stop(c.currentTime + i * 0.4 + 0.3);
                    }
                } else {
                    [523, 659, 783].forEach((f, i) => {
                        const o = c.createOscillator(); const g = c.createGain(); o.connect(g).connect(m);
                        o.frequency.setValueAtTime(f, c.currentTime + i * 0.1); g.gain.setValueAtTime(0.3, c.currentTime + i * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + i * 0.1 + 0.4); o.start(c.currentTime + i * 0.1); o.stop(c.currentTime + i * 0.1 + 0.4);
                    });
                }
            } catch (e) { }
        }

        document.getElementById('btn-start').onclick = function () {
            if (!navigator.geolocation) return alert("GPS غير مدعوم في جهازك");

            initAudio();
            isTracking = true;
            requestWakeLock();

            const btn = this;
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader"></i><span>جاري التحديد...</span>`;
            document.getElementById('gps-status').textContent = "جاري البحث";
            document.getElementById('gps-status').style.color = '#FFD700';
            document.getElementById('gps-icon').style.color = '#FFD700';
            lucide.createIcons();

            // إعدادات محسنة لتجنب التقطيع
            const geoOptions = { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 };

            const handleError = (err) => {
                if (err.code === 1) {
                    btn.disabled = false; isTracking = false;
                    btn.innerHTML = `<i data-lucide="play-circle"></i><span>تفعيل التتبع</span>`;
                    document.getElementById('gps-status').textContent = "مرفوض";
                    document.getElementById('gps-status').style.color = 'var(--danger)';
                    document.getElementById('coords-display').textContent = "---";
                    lucide.createIcons();
                    alert("الرجاء السماح بالوصول إلى الموقع.");
                } else {
                    document.getElementById('gps-status').textContent = "إشارة ضعيفة";
                    document.getElementById('gps-status').style.color = 'var(--danger)';
                }
            };

            if (watchId) navigator.geolocation.clearWatch(watchId);

            watchId = navigator.geolocation.watchPosition((pos) => {
                btn.innerHTML = `<i data-lucide="check-circle"></i><span>مفعل</span>`;
                document.getElementById('gps-status').textContent = "متصل";
                document.getElementById('gps-status').style.color = 'var(--primary)';
                document.getElementById('gps-icon').style.color = 'var(--primary)';
                lucide.createIcons();

                updatePosition(pos);
            }, handleError, geoOptions);
        };

        function updatePosition(pos) {
            const { latitude, longitude, speed, heading, accuracy } = pos.coords;
            const kmh = speed ? (speed * 3.6).toFixed(0) : 0;

            document.getElementById('speed').textContent = kmh;
            document.getElementById('coords-display').innerHTML = `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
            document.getElementById('heading').textContent = heading ? heading.toFixed(0) + "°" : "---";

            let sigText = "ضعيفة";
            let sigColor = "var(--danger)";
            if (accuracy <= 20) { sigText = "ممتازة"; sigColor = "var(--primary)"; }
            else if (accuracy <= 50) { sigText = "جيدة"; sigColor = "var(--warning)"; }

            document.getElementById('gps-status').textContent = sigText;
            document.getElementById('gps-status').style.color = sigColor;
            document.getElementById('gps-acc').textContent = `(±${Math.round(accuracy)}م)`;

            if (heading) {
                document.getElementById('compass-arrow').style.transform = `rotate(${heading}deg)`;
                document.getElementById('compass-arrow').style.color = 'var(--primary)';
            }

            const currentPos = [latitude, longitude];

            if (!window.uM) {
                window.uM = L.marker(currentPos, { icon: getMarkerIcon('#00d1b2'), zIndexOffset: 1000 }).addTo(map);
                map.setView(currentPos, 16);
            } else {
                window.uM.setLatLng(currentPos);
                // الانزلاق الناعم (Smooth Panning) للكاميرا
                map.panTo(currentPos, { animate: true, duration: 0.8 });
            }

            checkZones(latitude, longitude);
            runRadar(latitude, longitude);
        }

        function checkZones(la, ln) {
            let f = zonesData.find(z => isP(la, ln, z.coords));
            const lbl = document.getElementById('zone-check');
            const b = document.getElementById('main-body');
            let currentLatLng = L.latLng(la, ln);

            // تحديث لون النقطة (السيارة) لتطابق النطاق
            let dotColor = f ? f.color : '#00d1b2';
            if (window.uM) window.uM.setIcon(getMarkerIcon(dotColor));

            if (f) {
                lbl.textContent = f.name; lbl.style.color = f.color;

                let shouldAlert = false;
                if (lastZ !== f.name) {
                    shouldAlert = true;
                } else if (lastAlertLocation) {
                    if (currentLatLng.distanceTo(lastAlertLocation) >= 5000) shouldAlert = true;
                }

                if (shouldAlert) {
                    lastZ = f.name; lastAlertLocation = currentLatLng;

                    // إزالة الحالات القديمة
                    b.classList.remove('is-red-alert', 'is-yellow-alert');

                    if (f.color === "#ff3860") {
                        b.classList.add('is-red-alert');
                        showModal("تحذير أمني عالي", f.msg, "🚨");
                        playBell('danger');
                    } else {
                        // النطاق البرتقالي أو الأصفر
                        b.classList.add('is-yellow-alert');
                        showModal("تنبيه تنظيمي", f.msg, "⚠️");
                        playBell('info');
                    }
                }
            } else {
                lbl.textContent = "نطاق آمن"; lbl.style.color = "var(--primary)";
                b.classList.remove('is-red-alert', 'is-yellow-alert');
                lastZ = null;
            }
        }

        function runRadar(la, ln) {
            const p = turf.point([ln, la]); let md = Infinity; let mz = null;
            zonesData.forEach(z => {
                let cs = z.coords.map(c => [c[1], c[0]]); cs.push(cs[0]);
                let d = turf.distance(p, turf.pointOnFeature(turf.polygon([cs])));
                if (d < md) { md = d; mz = z; }
            });

            if (!mz) return;

            let color = md < 1 ? "var(--danger)" : "var(--warning)";
            document.getElementById('radar-dist').textContent = md.toFixed(2);
            document.getElementById('radar-dist').style.color = color;
            document.getElementById('radar-name').textContent = mz.name;

            // منطق تحذيرات القرب (كل 1 كم في نطاق 5 كم)
            if (md <= 5) {
                const currentKm = Math.floor(md);
                if (currentKm !== lastProximityKm) {
                    lastProximityKm = currentKm;
                    const alertMsg = `أنت على بعد ${currentKm === 0 ? "أقل من 1" : currentKm} كم من ${mz.name}`;

                    if (mz.color === "#ff3860") {
                        // النطاق الأحمر: تنبيه عالي الأولوية (نافذة منبثقة + صوت مزعج)
                        showModal("تحذير اقتراب خطر", alertMsg, "🚨");
                        playBell('alarm');
                    } else {
                        // النطاقات الأخرى: تنبيه HUD خفيف (يختفي بعد 15 ثانية)
                        showHUDNotification(alertMsg);
                        playBell('info');
                    }
                }
            } else {
                lastProximityKm = -1; // إعادة التعيين عند الابتعاد
            }
        }

        function isP(la, ln, py) {
            let i = false; for (let a = 0, b = py.length - 1; a < py.length; b = a++) {
                if (((py[a][1] > ln) != (py[b][1] > ln)) && (la < (py[b][0] - py[a][0]) * (ln - py[a][1]) / (py[b][1] - py[a][1]) + py[a][0])) i = !i;
            } return i;
        }

        function showModal(t, m, e) {
            document.getElementById('alert-title').textContent = t;
            document.getElementById('alert-msg').textContent = m;
            document.getElementById('alert-ico').textContent = e;
            document.getElementById('backdrop').style.display = 'block';
            document.getElementById('lux-modal').style.display = 'block';
        }

        function showHUDNotification(msg) {
            const hud = document.getElementById('hud-notification');
            document.getElementById('hud-notif-msg').textContent = msg;
            hud.classList.add('is-active');

            if (alertNotifTimeout) clearTimeout(alertNotifTimeout);
            alertNotifTimeout = setTimeout(() => {
                hud.classList.remove('is-active');
            }, 15000); // تختفي بعد 15 ثانية
        }

        function closeAlert() {
            document.getElementById('backdrop').style.display = 'none';
            document.getElementById('lux-modal').style.display = 'none';
            document.getElementById('hud-notification').classList.remove('visible');
        }
    </script>
</body>

</html>
