<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <title>نظام المراقبة والتتبع المكاني</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a12; color: white; }
        
        /* شريط المعلومات العلوي */
        #top-bar { position: fixed; top: 0; left: 0; right: 0; min-height: 90px; background: rgba(16, 16, 30, 0.95); border-bottom: 2px solid #00b894; z-index: 1000; display: flex; flex-direction: column; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .dashboard { display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 8px; }
        
        .stat-box { background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 12px; border: 1px solid rgba(0,184,148,0.3); text-align: center; flex: 1; min-width: 90px; }
        .stat-label { font-size: 11px; color: #aaa; display: block; margin-bottom: 4px; }
        .stat-value { font-size: 14px; font-weight: bold; color: #fff; }
        .stat-sub { font-size: 10px; color: #888; }

        .controls { display: flex; gap: 10px; margin-top: 10px; justify-content: center; flex-wrap: wrap; }
        .btn { border: none; padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.3s; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #btn-start { background: linear-gradient(135deg, #00b894 0%, #00a085 100%); color: white; }
        #btn-settings { background: #34495e; color: white; border: 1px solid #576574; }
        .btn:disabled { background: #00b894; cursor: not-allowed; box-shadow: none; opacity: 0.9; }

        #map-container { position: absolute; top: 135px; left: 0; right: 0; bottom: 0; z-index: 1; }
        #map { height: 100%; width: 100%; background: #1a1a2e; }

        /* نافذة التنبيهات والمودال */
        #backdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9998; backdrop-filter: blur(8px); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 420px; background: #161625; padding: 30px; border-radius: 20px; z-index: 9999; text-align: center; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.7); color: white; }
        
        .legal-alert { border: 2px solid #ff4757; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { transform: translate(-50%, -20%); opacity: 0; } to { transform: translate(-50%, -50%); opacity: 1; } }
        
        .alert-icon { font-size: 55px; margin-bottom: 10px; display: block; }
        .legal-msg { font-size: 16px; line-height: 1.6; margin: 15px 0; font-weight: 500; white-space: pre-wrap; }
        .close-btn { background: white; color: #000; padding: 12px 40px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }

        /* إعدادات المناطق */
        .zones-list { text-align: right; max-height: 300px; overflow-y: auto; margin: 20px 0; padding-right: 10px; }
        .zone-option { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 15px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 8px; cursor: pointer; }
        .zone-option input[type="checkbox"] { transform: scale(1.3); cursor: pointer; accent-color: #00b894; }
        .zone-color-box { width: 16px; height: 16px; border-radius: 4px; display: inline-block; border: 1px solid rgba(255,255,255,0.5); }
        .save-settings-btn { background: #00b894; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }

        /* تصميم المسميات المطبوعة على الخريطة */
        .zone-name-label {
            width: 0 !important;
            height: 0 !important;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none !important; /* يمنع التفاعل مع النص حتى لا يعيق تحريك الخريطة */
        }
        .zone-label-content {
            position: absolute;
            transform: translate(-50%, -50%);
            background: rgba(16, 16, 30, 0.85);
            color: #fff;
            padding: 4px 12px;
            border-radius: 8px;
            border-bottom: 2px solid;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            text-shadow: 0 1px 3px rgba(0,0,0,1);
        }

        /* كلاس الأيقونة النقي لتحديد موقع السيارة */
        .pure-html-marker { background: transparent; border: none; }
        .safe-user-marker {
            border-radius: 50%;
            border: 3px solid #ffffff;
            box-shadow: 0 0 15px rgba(0,0,0,0.8), inset 0 0 5px rgba(0,0,0,0.3);
            transition: background-color 0.4s ease;
        }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="dashboard">
        <div class="stat-box"><span class="stat-label">🚀 السرعة</span><span id="speed" class="stat-value">0</span> <span class="stat-sub">كم/س</span></div>
        <div class="stat-box"><span class="stat-label">📍 الموقع</span><span id="coords-display" class="stat-value" style="font-size: 13px; direction: ltr;">---</span></div>
        <div class="stat-box"><span class="stat-label">📶 إشارة GPS</span><span id="signal-strength" class="stat-value" style="color:#aaa;">---</span> <span id="accuracy-val" class="stat-sub"></span></div>
        <div class="stat-box"><span class="stat-label">🎯 المنطقة</span><span id="zone-check" class="stat-value" style="color:#00ff88">منطقة آمنة</span></div>
        <div class="stat-box"><span class="stat-label">📡 الحالة</span><span id="gps-status" class="stat-value" style="color:#ff4757">غير متصل</span></div>
    </div>
    <div class="controls">
        <button id="btn-start" class="btn">📡 تفعيل تحديد الموقع</button>
        <button id="btn-settings" class="btn" onclick="openSettings()">⚙️ إعدادات المناطق</button>
    </div>
</div>

<div id="backdrop"></div>

<div id="legal-modal" class="modal legal-alert">
    <span class="alert-icon" id="alert-icon-display">⚠️</span>
    <h3 id="alert-title" style="font-size: 24px; color: #fff; margin-bottom: 5px;">تنبيه تنظيمي</h3>
    <p id="legal-text" class="legal-msg"></p>
    <button class="close-btn" onclick="closeAlert()">علم، سألتزم</button>
</div>

<div id="settings-modal" class="modal">
    <h3 style="color: #fff; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 10px;">المناطق النشطة</h3>
    <p style="font-size: 12px; color: #aaa;">لن يتم رسم أو إطلاق تنبيهات للمناطق غير المحددة.</p>
    <div class="zones-list" id="zones-list-container"></div>
    <button class="save-settings-btn" onclick="saveSettings()">حفظ وإغلاق</button>
</div>

<div id="map-container"><div id="map"></div></div>

<script>
    // الورديات الأربعة فقط
    const masterZonesData = [
        { 
            name: "الوردية الأولى", color: "#F57C00", msg: "نطاق منع نقل غير المصرح لهم. تأكد من حمل التراخيص اللازمة.",
            coords: [[21.4205663,39.7784752],[21.4391024,39.775042],[21.4397415,39.7606225],[21.4359067,39.7571892],[21.4314325,39.7482628],[21.4298346,39.7444863],[21.4298346,39.7365899],[21.4288759,39.7247452],[21.4248809,39.7189087],[21.4218447,39.709124],[21.4180094,39.6969361],[21.4164113,39.6919579],[21.3799705,39.6969361],[21.3873233,39.7044892],[21.3932373,39.7092957],[21.4053841,39.7183938],[21.4112974,39.7240586],[21.4119366,39.7374482],[21.4114572,39.7444863],[21.4101787,39.7530694],[21.4135348,39.7544426],[21.4143338,39.7630257],[21.4146534,39.7678322],[21.416731,39.774012],[21.4205663,39.7784752]] 
        },
        { 
            name: "الوردية الثانية", color: "#F57C00", msg: "منطقة تتطلب الحصول على تصاريح رسمية لدخولها.",
            coords: [[21.349931,39.8036451],[21.3467333,39.7954053],[21.349931,39.7802991],[21.3448147,39.7658796],[21.3422565,39.7445936],[21.3422565,39.730174],[21.3435356,39.7116346],[21.3416169,39.6985883],[21.3396982,39.687602],[21.3358608,39.6711225],[21.3320232,39.6628827],[21.3320232,39.654643],[21.3365003,39.6381635],[21.3320232,39.6292371],[21.3173116,39.6402234],[21.2981204,39.6484632],[21.2898034,39.6580762],[21.2866044,39.6697492],[21.2795664,39.6834821],[21.2578106,39.7171277],[21.2334914,39.7377271],[21.2232506,39.75146],[21.2290112,39.774806],[21.2405316,39.8002118],[21.2430916,39.8098249],[21.2430916,39.8228711],[21.2616501,39.8283643],[21.2782868,39.8256177],[21.3013191,39.8180646],[21.3262667,39.8105115],[21.349931,39.8036451]] 
        },
        { 
            name: "الوردية الثالثة", color: "#F57C00", msg: "منطقة مراقبة أمنية: يمنع الوقوف في هذا النطاق.",
            coords: [[21.3534549,39.8504782],[21.350737,39.8424959],[21.3504973,39.8377752],[21.3512167,39.8328829],[21.3539827,39.8240503],[21.3539266,39.8209214],[21.353231,39.8179642],[21.3496484,39.8044189],[21.3420233,39.8052454],[21.3282721,39.8096228],[21.2968475,39.8193216],[21.2682957,39.8261023],[21.2439782,39.8261023],[21.2279777,39.8254156],[21.2242974,39.8250723],[21.2133358,39.8288489],[21.19109,39.8378611],[21.1795657,39.8458433],[21.1694812,39.8570872],[21.1669199,39.8638678],[21.1669999,39.8734808],[21.1694812,39.878974],[21.1758841,39.8849821],[21.1839674,39.893136],[21.1852479,39.8983717],[21.1858881,39.9043799],[21.188369,39.9092722],[21.1935708,39.9125338],[21.1978121,39.9133063],[21.2018132,39.9121905],[21.2082147,39.9101305],[21.2122155,39.9086714],[21.2140865,39.9083598],[21.2181366,39.9094439],[21.221257,39.9116755],[21.2237373,39.9132204],[21.2276577,39.9139929],[21.2326981,39.9147654],[21.2380583,39.9151945],[21.2441382,39.9156237],[21.2474981,39.9163103],[21.2534977,39.9190569],[21.2573373,39.9219752],[21.2659761,39.9342489],[21.2665666,39.935139],[21.2684862,39.9349673],[21.271495,39.9334765],[21.2766139,39.9306441],[21.286851,39.9239493],[21.2885305,39.9222326],[21.2888504,39.9199152],[21.2877307,39.916997],[21.2873615,39.9150546],[21.2896007,39.9124797],[21.2925291,39.9109888],[21.2942391,39.9102481],[21.2969275,39.9060965],[21.3028357,39.8993476],[21.2999969,39.8793491],[21.3134309,39.8774608],[21.3145103,39.8793061],[21.3158297,39.8769887],[21.3163094,39.8760017],[21.3251846,39.8737271],[21.326224,39.8757013],[21.3251004,39.8751004],[21.3273433,39.8787912],[21.3273433,39.8787053],[21.3408547,39.8614534],[21.3534549,39.8504782]] 
        },
        { 
            name: "الوردية الرابعة", color: "#F57C00", msg: "نطاق تنظيمي خاص: يرجى الالتزام بالمسارات المحددة.",
            coords: [[21.3768231,39.6915736],[21.3429272,39.7071064],[21.3434134,39.7106172],[21.3435298,39.7114535],[21.3434756,39.7128731],[21.3425379,39.7263627],[21.3424377,39.7341783],[21.3425794,39.7417194],[21.3427933,39.7456146],[21.3430165,39.7476955],[21.3437566,39.7526972],[21.3439753,39.7561032],[21.3443700,39.7608616],[21.3452364,39.7668436],[21.3455672,39.7677304],[21.3477767,39.7736598],[21.3494679,39.7755813],[21.3545090,39.7738075],[21.3741795,39.7658747],[21.3798482,39.7645530],[21.3942631,39.7620645],[21.3996377,39.7611926],[21.4036783,39.7587149],[21.4094647,39.7547994],[21.4101935,39.7517526],[21.4114849,39.7433814],[21.4117082,39.7392697],[21.4117093,39.7353041],[21.4116063,39.7340390],[21.4115296,39.7317470],[21.4114596,39.7305534],[21.4113608,39.7279882],[21.4112776,39.7257227],[21.4112293,39.7244106],[21.4112254,39.7240175],[21.3849936,39.7023201],[21.3798798,39.6968708],[21.3768231,39.6915736]] 
        }
    ];

    let activeZones = masterZonesData.map(z => z.name);
    let polygonsLayer = L.layerGroup();
    
    // إعداد الخريطة
    let map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.4, 39.8], 10);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    polygonsLayer.addTo(map);

    function renderZones() {
        polygonsLayer.clearLayers();
        masterZonesData.forEach(z => {
            if (activeZones.includes(z.name)) {
                // رسم المضلع
                const p = L.polygon(z.coords, { color: z.color, fillOpacity: 0.18, weight: 2 }).addTo(polygonsLayer);
                
                // نافذة تعريفية عند النقر
                p.bindPopup(`<div style="text-align:right; font-family: 'Segoe UI', Tahoma, sans-serif;">
                    <h4 style="color:${z.color}; margin-bottom:5px;">${z.name}</h4>
                    <p style="margin:0; font-size:13px; color:#555;">${z.msg}</p>
                </div>`);

                // حساب المركز الهندسي لطباعة الاسم فوق المنطقة
                try {
                    let turfCoords = z.coords.map(c => [c[1], c[0]]);
                    if (turfCoords[0][0] !== turfCoords[turfCoords.length-1][0] || turfCoords[0][1] !== turfCoords[turfCoords.length-1][1]) {
                        turfCoords.push(turfCoords[0]);
                    }
                    let poly = turf.polygon([turfCoords]);
                    let centroid = turf.centroid(poly);
                    let centerLng = centroid.geometry.coordinates[0];
                    let centerLat = centroid.geometry.coordinates[1];

                    // إنشاء مربع النص الشفاف
                    let labelIcon = L.divIcon({
                        className: 'zone-name-label',
                        html: `<div class="zone-label-content" style="border-bottom-color: ${z.color};">${z.name}</div>`,
                        iconSize: null
                    });

                    // إضافة النص كعلامة غير قابلة للنقر
                    L.marker([centerLat, centerLng], { icon: labelIcon, interactive: false }).addTo(polygonsLayer);
                } catch(e) {
                    console.log("Centroid calculation error:", e);
                }
            }
        });
    }
    
    renderZones();

    function initSettingsModal() {
        const container = document.getElementById('zones-list-container');
        container.innerHTML = '';
        masterZonesData.forEach(z => {
            const isChecked = activeZones.includes(z.name) ? 'checked' : '';
            container.innerHTML += `
                <label class="zone-option">
                    <input type="checkbox" value="${z.name}" ${isChecked}>
                    <span class="zone-color-box" style="background-color: ${z.color};"></span>
                    ${z.name}
                </label>
            `;
        });
    }

    function openSettings() {
        initSettingsModal();
        document.getElementById('backdrop').style.display = 'block';
        document.getElementById('settings-modal').style.display = 'block';
    }

    function saveSettings() {
        const checkboxes = document.querySelectorAll('#zones-list-container input[type="checkbox"]');
        activeZones = []; 
        checkboxes.forEach(cb => {
            if (cb.checked) activeZones.push(cb.value);
        });
        
        renderZones();
        document.getElementById('backdrop').style.display = 'none';
        document.getElementById('settings-modal').style.display = 'none';
        
        if (window.userMarker) {
            let latlng = window.userMarker.getLatLng();
            checkZones(latlng.lat, latlng.lng);
        }
    }

    // النقطة الآمنة لتمثيل السيارة
    function getMarkerIcon(colorCode) {
        return L.divIcon({
            className: 'pure-html-marker',
            html: `<div class="safe-user-marker" style="background-color: ${colorCode}; width: 22px; height: 22px;"></div>`,
            iconSize: [22, 22],
            iconAnchor: [11, 11]
        });
    }

    let wakeLock = null;
    let isTracking = false; 
    let lastAlertZoneName = null;
    let lastAlertLocation = null;
    let watchId = null;

    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {}
        }
    }

    document.addEventListener('visibilitychange', async () => {
        if (isTracking && wakeLock !== null && document.visibilityState === 'visible') {
            await requestWakeLock();
        }
    });

    function playAlertSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        } catch(e) {}
    }

    document.getElementById('btn-start').onclick = function() {
        if (!navigator.geolocation) {
            alert("GPS غير مدعوم في جهازك أو متصفحك");
            return;
        }
        
        const btn = this;
        btn.disabled = true;
        btn.textContent = "جاري تحديد الموقع...";
        document.getElementById('gps-status').textContent = "جاري البحث";
        document.getElementById('gps-status').style.color = '#FFD700';

        isTracking = true;
        requestWakeLock();

        // تحسين الأداء والتتبع
        const geoOptions = { 
            enableHighAccuracy: true, 
            timeout: 10000, 
            maximumAge: 0 
        };

        const handleError = (err) => {
            console.warn(`ERROR(${err.code}): ${err.message}`);
            if(err.code === 1) {
                btn.disabled = false;
                btn.textContent = "📡 تفعيل تحديد الموقع";
                document.getElementById('gps-status').textContent = "مرفوض";
                document.getElementById('gps-status').style.color = '#ff4757';
                document.getElementById('coords-display').textContent = "---";
                isTracking = false;
                alert("الرجاء السماح للمتصفح بالوصول إلى موقعك.");
            } else {
                document.getElementById('gps-status').textContent = "إشارة ضعيفة";
                document.getElementById('gps-status').style.color = '#ff4757';
            }
        };

        if(watchId) navigator.geolocation.clearWatch(watchId);
        
        watchId = navigator.geolocation.watchPosition((pos) => {
            btn.textContent = "مفعل";
            document.getElementById('gps-status').textContent = "متصل";
            document.getElementById('gps-status').style.color = '#00ff88';
            updatePosition(pos);
        }, handleError, geoOptions);
    };

    function updatePosition(pos) {
        const { latitude, longitude, speed, accuracy } = pos.coords;
        const kmh = speed ? (speed * 3.6).toFixed(1) : 0;
        
        document.getElementById('speed').textContent = kmh;
        document.getElementById('coords-display').innerHTML = `<span dir="ltr">${latitude.toFixed(5)}, ${longitude.toFixed(5)}</span>`;
        document.getElementById('coords-display').style.color = '#fff';
        
        let sigText = "ضعيفة 🔴";
        let sigColor = "#ff4757";
        if (accuracy <= 20) { sigText = "ممتازة 🟢"; sigColor = "#00ff88"; }
        else if (accuracy <= 50) { sigText = "جيدة 🟡"; sigColor = "#FFD700"; }
        
        document.getElementById('signal-strength').textContent = sigText;
        document.getElementById('signal-strength').style.color = sigColor;
        document.getElementById('accuracy-val').textContent = `(±${Math.round(accuracy)}م)`;

        const currentPos = [latitude, longitude];
        
        if (!window.userMarker) {
            window.userMarker = L.marker(currentPos, { icon: getMarkerIcon('#00ff88'), zIndexOffset: 1000 }).addTo(map);
            map.setView(currentPos, 16); 
        } else {
            window.userMarker.setLatLng(currentPos);
            // تحريك الخريطة بنعومة لتتبع السيارة
            map.panTo(currentPos, { animate: true, duration: 0.5 }); 
        }
        
        checkZones(latitude, longitude);
    }

    function checkZones(lat, lng) {
        let currentLatLng = L.latLng(lat, lng);
        let foundZone = null;
        
        let activeZonesData = masterZonesData.filter(z => activeZones.includes(z.name));

        activeZonesData.forEach(z => {
            if (isPointInPoly(lat, lng, z.coords)) foundZone = z;
        });

        const label = document.getElementById('zone-check');

        let markerColor = foundZone ? foundZone.color : '#00ff88'; 
        if (window.userMarker) {
            window.userMarker.setIcon(getMarkerIcon(markerColor));
        }

        if (foundZone) {
            label.textContent = foundZone.name;
            label.style.color = foundZone.color;
            
            let shouldShowAlert = false;
            
            if (lastAlertZoneName !== foundZone.name) {
                shouldShowAlert = true;
            } else if (lastAlertLocation) {
                let distanceMeters = currentLatLng.distanceTo(lastAlertLocation);
                if (distanceMeters >= 5000) {
                    shouldShowAlert = true;
                }
            }

            if (shouldShowAlert) {
                lastAlertZoneName = foundZone.name;
                lastAlertLocation = currentLatLng; 
                playAlertSound();
                showLegalAlert(foundZone.msg, foundZone.color);
            }
        } else {
            label.textContent = "منطقة آمنة";
            label.style.color = "#00ff88";
            lastAlertZoneName = null; 
        }
    }

    function isPointInPoly(lat, lng, poly) {
        let inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            let xi = poly[i][0], yi = poly[i][1], xj = poly[j][0], yj = poly[j][1];
            if (((yi > lng) != (yj > lng)) && (lat < (xj - xi) * (lng - yi) / (yj - yi) + xi)) inside = !inside;
        }
        return inside;
    }

    function showLegalAlert(text, color) {
        document.getElementById('backdrop').style.display = 'block';
        const modal = document.getElementById('legal-modal');
        modal.style.display = 'block';
        modal.style.borderColor = color;
        modal.style.background = `linear-gradient(135deg, ${color}33 0%, rgba(16,16,30,0.95) 100%)`;
        document.getElementById('legal-text').textContent = text;
    }

    function closeAlert() {
        document.getElementById('backdrop').style.display = 'none';
        document.getElementById('legal-modal').style.display = 'none';
        document.getElementById('settings-modal').style.display = 'none';
    }
</script>
</body>
</html>
