<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <title>Precision Pro Navigation | HUD</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #00f2ff;
            --danger: #ff0044;
            --warning: #ffcc00;
            --bg: #131720;
            --panel-bg: rgba(30, 35, 45, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text-main);
        }

        .app-container {
            display: flex; flex-direction: column; height: 100vh;
            padding: 15px; box-sizing: border-box; gap: 15px;
        }

        .top-header { display: flex; flex-direction: column; gap: 15px; z-index: 10; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; }

        .left-actions { display: flex; gap: 8px; align-items: center; }

        .action-btn {
            background: var(--panel-bg); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 8px 14px; color: var(--text-main);
            font-family: 'Cairo'; font-size: 13px; display: flex; align-items: center;
            gap: 6px; cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .action-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .action-btn.active-tracking { background: var(--primary); color: #000; border-color: var(--primary); font-weight: 900; }

        .logo-box { display: flex; align-items: center; gap: 8px; }
        .logo-text { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.2; }
        .logo-en { font-size: 13px; font-weight: 900; letter-spacing: 0.5px; }
        .logo-ar { font-size: 10px; color: var(--text-dim); }
        .logo-icon { color: var(--primary); width: 28px; height: 28px; filter: drop-shadow(0 0 5px var(--primary)); }

        #hud-top { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

        .hud-card {
            background: var(--panel-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 14px;
            padding: 12px; display: flex; align-items: center; justify-content: center;
            gap: 10px; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3); position: relative;
        }

        .hud-icon { color: var(--primary); width: 24px; height: 24px; filter: drop-shadow(0 0 5px rgba(0, 242, 255, 0.3)); }

        .hud-val-box { display: flex; flex-direction: column; }
        .hud-label { font-size: 10px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; }
        .hud-main-val { font-size: 14px; font-weight: 900; }

        .speed-gauge { position: relative; width: 65px; height: 65px; }
        .gauge-svg { transform: rotate(135deg); width: 100%; height: 100%; }
        .gauge-bg { fill: none; stroke: rgba(255, 255, 255, 0.05); stroke-width: 5; stroke-dasharray: 165 220; }
        .gauge-progress { 
            fill: none; stroke: var(--primary); stroke-width: 5; stroke-linecap: round;
            stroke-dasharray: 165 220; stroke-dashoffset: 165; transition: stroke-dashoffset 0.4s ease;
            filter: drop-shadow(0 0 5px var(--primary));
        }
        .speed-text-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .speed-number { font-size: 22px; font-weight: 900; color: var(--primary); line-height: 1; }

        .map-container { flex: 1; position: relative; border-radius: 20px; overflow: hidden; border: 1px solid var(--glass-border); }

        #map { position: absolute; inset: 0; z-index: 0; }

        #search-box {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 350px; max-width: 90%;
        }
        .search-input {
            width: 100%; background: var(--panel-bg); border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 10px 15px 10px 42px; color: #fff;
            font-family: 'Cairo'; font-size: 13px; outline: none; backdrop-filter: blur(15px);
        }
        .search-ic { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-dim); width: 18px; }

        #nav-card {
            position: absolute; right: 15px; top: 15px; z-index: 1000;
            width: 250px; background: var(--panel-bg); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 15px; display: none; backdrop-filter: blur(20px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6); animation: slideIn 0.4s ease;
        }

        #vignette { position: absolute; inset: 0; pointer-events: none; z-index: 1500; transition: 0.5s; }
        .red-alert #vignette { animation: flashRed 1.5s infinite; }
        @keyframes flashRed { 0%, 100% { box-shadow: inset 0 0 50px rgba(255, 0, 68, 0); } 50% { box-shadow: inset 0 0 150px rgba(255, 0, 68, 0.4); } }

        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
            z-index: 3000; backdrop-filter: blur(10px); align-items: center; justify-content: center;
        }
        .modal { background: #111; border: 1px solid var(--glass-border); padding: 30px; border-radius: 20px; width: 350px; text-align: center; }

        .user-marker { width: 20px; height: 20px; background: #fff; border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 15px var(--primary); }
        .user-marker::after { content: ''; position: absolute; inset: -12px; background: var(--primary); opacity: 0.15; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(3); opacity: 0; } }

        .speed-limit-badge {
            width: 45px; height: 45px; border-radius: 50%; border: 3px solid #fff;
            background: #fff; color: #cc0000; font-weight: 900; font-size: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 0 2px #cc0000;
        }
        .speed-limit-badge small { font-size: 7px; color: #333; }
        .speed-over .speed-number { color: var(--danger) !important; animation: blink 0.6s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }

        [dir="rtl"] .search-input { padding: 10px 42px 10px 15px; }
        [dir="rtl"] .search-ic { right: 15px; left: auto; }

        @media (max-width: 900px) {
            #hud-top { grid-template-columns: repeat(2, 1fr); }
            .logo-ar { display: none; }
        }
        @media (max-width: 600px) {
            .app-container { padding: 8px; gap: 8px; }
            #hud-top { gap: 8px; }
            .hud-card { padding: 10px; }
            .hud-main-val { font-size: 12px; }
            .speed-gauge { width: 55px; height: 55px; }
            .speed-number { font-size: 18px; }
            #search-box { width: 95%; top: 10px; }
            #nav-card { width: 90%; right: 5%; top: auto; bottom: 20px; transform: none; }
            .action-btn span { font-size: 11px; }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header class="top-header">
            <div class="top-bar">
                <div class="left-actions">
                    <button class="action-btn" id="start-btn" onclick="startTracking()" style="background: var(--primary); color: #000; font-weight: 900;">
                        <i data-lucide="play" style="width:14px"></i>
                        <span>تفعيل التتبع</span>
                    </button>
                    <button class="action-btn" id="permit-btn" onclick="togglePermit()" style="border-color:var(--danger)">
                        <i id="permit-icon" data-lucide="shield-alert" style="color:var(--danger); width:14px"></i>
                        <span id="permit-label" style="color:var(--danger)">غير مصرح</span>
                    </button>
                </div>
                <div class="logo-box">
                    <div class="logo-text">
                        <span class="logo-en">PRECISION PRO</span>
                        <span class="logo-ar">بريسيشن برو</span>
                    </div>
                    <i data-lucide="shield-check" class="logo-icon"></i>
                </div>
            </div>

            <div id="hud-top">
                <div class="hud-card">
                    <i data-lucide="satellite" class="hud-icon"></i>
                    <div class="hud-val-box">
                        <span class="hud-label">الإشارة</span>
                        <span id="gps-status" class="hud-main-val">بانتظار GPS</span>
                    </div>
                </div>

                <div class="hud-card">
                    <i data-lucide="shield" class="hud-icon"></i>
                    <div class="hud-val-box">
                        <span class="hud-label">النطاق</span>
                        <span id="zone-name" class="hud-main-val" style="color: var(--primary)">آمن</span>
                    </div>
                </div>

                <div class="hud-card">
                    <div class="hud-val-box" style="direction: ltr; text-align: left;">
                        <span class="hud-label">الإحداثيات</span>
                        <span id="coords-n" class="hud-main-val">0.0000° N</span>
                        <span id="coords-e" class="hud-main-val">0.0000° E</span>
                    </div>
                </div>

                <div class="hud-card" id="speed-card">
                    <div class="speed-gauge">
                        <svg class="gauge-svg" viewBox="0 0 80 80">
                            <circle class="gauge-bg" cx="40" cy="40" r="35"></circle>
                            <circle id="speed-ring" class="gauge-progress" cx="40" cy="40" r="35"></circle>
                        </svg>
                        <div class="speed-text-center">
                            <span class="speed-number" id="speed-val">0</span>
                        </div>
                    </div>
                    <div class="speed-limit-badge" id="speed-limit-badge">
                        <span id="speed-limit-val">--</span>
                        <small>حد</small>
                    </div>
                </div>
            </div>
        </header>

        <main class="map-container">
            <div id="map"></div>
            <div id="vignette"></div>
            <div id="search-box">
                <input type="text" id="destination-input" class="search-input" placeholder="ابحث عن وجهة..." onkeydown="handleSearch(event)">
                <i data-lucide="search" class="search-ic"></i>
            </div>
            <div id="nav-card">
                <div id="dest-name" style="font-weight:900; color:var(--primary); margin-bottom:10px">---</div>
                <div style="font-size:12px; opacity:0.8">
                    المسافة: <span id="nav-km">---</span> | الوصول: <span id="nav-min">---</span>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div style="font-size: 50px; margin-bottom: 20px;">🚨</div>
            <h2 id="modal-title" style="margin-bottom: 15px; font-weight: 900;">تحذير أمني</h2>
            <p id="modal-body" style="opacity: 0.8; line-height: 1.6; margin-bottom: 30px;"></p>
            <button onclick="closeModal()" style="background: var(--primary); color: #000; border: none; padding: 12px 40px; border-radius: 12px; font-weight: 900; cursor: pointer;">موافق</button>
        </div>
    </div>

    <script>
        let map, userMarker, targetMarker, routePolyline;
        let isAuthorized = false, currentPos = null, lastAlertTime = 0, currentSpeedLimit = null;

        const zonesData = [
            {
                name: "النطاق الأحمر (محظور)", color: "#ff3860",
                msg: "⚠️ منطقة محظورة أمنياً. يرجى الانسحاب فوراً.",
                coords: [[20.7015, 39.7455], [20.8211, 39.8381], [20.8394, 39.8482], [20.8436, 39.8879], [21.0258, 39.8699], [21.1165, 39.9144], [21.1456, 39.9230], [21.1956, 39.9397], [21.2941, 40.0710], [21.3378, 40.1866], [21.3370, 40.2659], [21.3613, 40.2679], [21.3617, 40.2683], [21.3618, 40.2686], [21.3709, 40.2658], [21.5372, 40.2847], [21.5523, 40.3267], [21.6214, 40.3904], [21.6628, 40.3989], [21.6421, 40.3272], [21.6345, 40.2868], [21.6350, 40.2452], [21.6306, 40.2232], [21.6310, 40.1911], [21.6183, 40.1682], [21.6213, 40.1439], [21.6098, 40.1109], [21.6393, 40.0948], [21.6589, 40.0681], [21.6569, 40.0231], [21.6690, 39.9894], [21.7050, 39.9725], [21.6857, 39.9288], [21.6819, 39.9065], [21.6924, 39.9005], [21.6924, 39.8717], [21.6779, 39.8581], [21.7094, 39.8170], [21.7241, 39.7876], [21.7155, 39.7573], [21.6822, 39.7271], [21.6319, 39.7012], [21.6420, 39.6564], [21.6541, 39.6305], [21.6824, 39.5614], [21.6756, 39.5592], [21.5886, 39.5309], [21.5054, 39.6010], [21.4626, 39.5605], [21.3376, 39.5516], [21.2825, 39.5582], [21.2601, 39.5623], [21.1619, 39.5988], [21.1244, 39.5923], [21.0425, 39.5902], [20.9793, 39.5715], [20.8335, 39.6396], [20.7015, 39.7455]]
            }
        ];

        function initMap() {
            lucide.createIcons();
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.4, 39.8], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            zonesData.forEach(z => {
                L.polygon(z.coords, { color: z.color, fillOpacity: 0.1, weight: 1.5, dashArray: '5, 5' }).addTo(map);
            });
        }

        function togglePermit() {
            isAuthorized = !isAuthorized;
            const btn = document.getElementById('permit-btn');
            const icon = document.getElementById('permit-icon');
            const label = document.getElementById('permit-label');
            btn.style.borderColor = isAuthorized ? 'var(--primary)' : 'var(--danger)';
            icon.setAttribute('data-lucide', isAuthorized ? 'shield-check' : 'shield-alert');
            icon.style.color = isAuthorized ? 'var(--primary)' : 'var(--danger)';
            label.innerText = isAuthorized ? 'مصرح' : 'غير مصرح';
            label.style.color = isAuthorized ? 'var(--primary)' : 'var(--danger)';
            lucide.createIcons();
            speak(isAuthorized ? "تم تفعيل التصريح" : "تم إلغاء التصريح");
            if (targetMarker) updateRoute(targetMarker.getLatLng());
        }

        async function handleSearch(e) {
            if (e.key === 'Enter') {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(e.target.value)}&limit=1`);
                const data = await res.json();
                if (data.length > 0) setDestination([parseFloat(data[0].lat), parseFloat(data[0].lon)], data[0].display_name);
            }
        }

        function setDestination(coords, name) {
            if (targetMarker) map.removeLayer(targetMarker);
            targetMarker = L.marker(coords).addTo(map);
            document.getElementById('nav-card').style.display = 'block';
            document.getElementById('dest-name').innerText = name.split(',')[0];
            updateRoute(coords);
        }

        async function updateRoute(dest) {
            if (!currentPos) return;
            const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${currentPos[1]},${currentPos[0]};${dest[1] ? dest[1] : dest.lng},${dest[0] ? dest[0] : dest.lat}?overview=full&geometries=geojson&alternatives=3`);
            const data = await res.json();
            if (data.routes && data.routes.length > 0) {
                let r = data.routes[0];
                if (!isAuthorized) {
                    const safe = data.routes.find(rt => !checkPathDanger(rt.geometry));
                    if (safe) r = safe; else speak("تنبيه: المسار يمر عبر منطقة محظورة");
                }
                if (routePolyline) map.removeLayer(routePolyline);
                routePolyline = L.geoJSON(r.geometry, { style: { color: !isAuthorized && checkPathDanger(r.geometry) ? 'var(--danger)' : 'var(--primary)', weight: 6, opacity: 0.7 } }).addTo(map);
                document.getElementById('nav-km').innerText = (r.distance / 1000).toFixed(1) + ' كم';
                document.getElementById('nav-min').innerText = Math.round(r.duration / 60) + ' د';
                map.fitBounds(routePolyline.getBounds(), { padding: [40, 40] });
            }
        }

        function checkPathDanger(routeGeo) {
            for (const z of zonesData) {
                const poly = turf.polygon([z.coords.map(c => [c[1], c[0]]).concat([[z.coords[0][1], z.coords[0][0]]])]);
                if (turf.booleanIntersects(routeGeo, poly)) return true;
            }
            return false;
        }

        function startTracking() {
            document.getElementById('start-btn').classList.add('active-tracking');
            document.getElementById('start-btn').innerHTML = '<i data-lucide="refresh-cw" style="width:14px"></i><span>تحديث الموقع</span>';
            lucide.createIcons();
            if (navigator.geolocation) navigator.geolocation.watchPosition(updateTracking, null, { enableHighAccuracy: true });
        }

        function updateTracking(pos) {
            const { latitude, longitude, speed } = pos.coords;
            currentPos = [latitude, longitude];
            document.getElementById('coords-n').innerText = `${latitude.toFixed(4)}° N`;
            document.getElementById('coords-e').innerText = `${longitude.toFixed(4)}° E`;
            document.getElementById('gps-status').innerText = "متصل";
            const kmh = Math.round((speed || 0) * 3.6);
            document.getElementById('speed-val').innerText = kmh;
            document.getElementById('speed-ring').style.strokeDashoffset = 165 - Math.min(1, kmh / 160) * 165;
            if (!userMarker) {
                userMarker = L.marker(currentPos, { icon: L.divIcon({ className: 'user-marker', iconSize: [20, 20] }) }).addTo(map);
                map.setView(currentPos, 15);
            } else userMarker.setLatLng(currentPos);
            checkZones(latitude, longitude);
        }

        function checkZones(lat, lon) {
            let found = null;
            const pt = turf.point([lon, lat]);
            zonesData.forEach(z => {
                const poly = turf.polygon([z.coords.map(c => [c[1], c[0]]).concat([[z.coords[0][1], z.coords[0][0]]])]);
                if (turf.booleanPointInPolygon(pt, poly)) found = z;
            });
            const lbl = document.getElementById('zone-name'), b = document.body;
            if (found) {
                lbl.innerText = found.name.split(' ')[1]; lbl.style.color = found.color;
                if (!isAuthorized && found.color === "#ff3860") {
                    b.classList.add('red-alert');
                    if (Date.now() - lastAlertTime > 20000) { showModal(found.name, found.msg); speak(found.msg); lastAlertTime = Date.now(); }
                }
            } else { lbl.innerText = "آمن"; lbl.style.color = "var(--primary)"; b.classList.remove('red-alert'); }
        }

        function showModal(t, b) { document.getElementById('modal-title').innerText = t; document.getElementById('modal-body').innerText = b; document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function speak(t) { if (!window.speechSynthesis) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'ar-SA'; window.speechSynthesis.speak(u); }

        initMap();
    </script>
</body>
</html>
