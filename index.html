<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <title>نظام الملاحة الهندسي برو | Road Commission Precision Pro</title>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Geoman for Customization -->
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

    <style>
        :root {
            --primary: #00d1b2;
            --secondary: #3273dc;
            --warning: #ffdd57;
            --danger: #ff3860;
            --glow: 0 0 15px rgba(0, 209, 178, 0.4);
            --glass: rgba(10, 10, 22, 0.85);
            --glass-border: rgba(255, 255, 255, 0.15);
            --safe-t: env(safe-area-inset-top, 0px);
            --safe-b: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Cairo', sans-serif;
            background: #000;
            color: white;
            letter-spacing: -0.2px;
        }

        /* Mission Critical HUD - Responsive Grid */
        #hud-top {
            position: fixed;
            top: calc(15px + var(--safe-t));
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 94%;
            max-width: 1200px;
        }

        @media (min-width: 768px) {
            #hud-top {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1024px) {
            #hud-top {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .hud-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            transition: all 0.3s;
        }

        .hud-card i {
            width: 20px;
            height: 20px;
            color: var(--primary);
        }

        .danger i {
            color: var(--danger);
        }

        .val-text {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .val-lbl {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .val-main {
            font-size: 17px;
            font-weight: 900;
            color: #fff;
            line-height: 1.2;
        }

        .val-unit {
            font-size: 11px;
            opacity: 0.5;
            margin-right: 3px;
            font-weight: 400;
        }

        /* Engineering Radar Sidebar */
        #radar-panel {
            position: fixed;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (max-width: 1023px) {
            #radar-panel {
                display: none;
            }
        }

        .radar-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            width: 180px;
            text-align: center;
            backdrop-filter: blur(15px);
        }

        /* Floating Controls Optimized for Touch */
        #hud-controls {
            position: fixed;
            bottom: calc(25px + var(--safe-b));
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            display: flex;
            gap: 12px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            padding: 12px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
        }

        .btn-hub {
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 9px;
            color: white;
            white-space: nowrap;
        }

        #btn-start {
            background: linear-gradient(135deg, #00d1b2, #00a891);
        }

        #btn-nav {
            background: linear-gradient(135deg, #3273dc, #1c52a8);
        }

        #btn-map-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
        }

        @media (max-width: 600px) {
            .btn-hub span {
                display: none;
            }

            .btn-hub {
                padding: 14px 18px;
            }
        }

        /* Map UI Overlay */
        #map {
            height: 100vh;
            width: 100vw;
            background: #000;
        }

        /* Perfection Alert Modal */
        #backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            backdrop-filter: blur(12px);
        }

        .lux-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 88%;
            max-width: 440px;
            background: linear-gradient(160deg, #1a1a2e, #0f0f1a);
            padding: 40px;
            border-radius: 35px;
            z-index: 2001;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9);
        }

        /* Regulatory Glow Pulse */
        #vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1500;
            transition: 0.5s;
        }

        .is-danger #vignette {
            animation: dangerVignette 2s infinite ease-in-out;
        }

        @keyframes dangerVignette {
            0% {
                box-shadow: inset 0 0 50px rgba(255, 56, 96, 0);
            }

            50% {
                box-shadow: inset 0 0 150px rgba(255, 56, 96, 0.5);
            }

            100% {
                box-shadow: inset 0 0 50px rgba(255, 56, 96, 0);
            }
        }

        .user-dot {
            width: 18px;
            height: 18px;
            background: #fff;
            border: 4px solid var(--secondary);
            border-radius: 50%;
            box-shadow: 0 0 25px var(--secondary);
            position: relative;
        }

        .user-dot::after {
            content: '';
            position: absolute;
            inset: -14px;
            border-radius: 50%;
            background: var(--secondary);
            opacity: 0.4;
            animation: scanPing 1.8s infinite;
        }

        @keyframes scanPing {
            from {
                transform: scale(0.5);
                opacity: 1;
            }

            to {
                transform: scale(3.5);
                opacity: 0;
            }
        }

        #nav-hint {
            position: fixed;
            bottom: 105px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--danger);
            color: white;
            padding: 15px 25px;
            border-radius: 20px;
            z-index: 1002;
            display: none;
            font-size: 14px;
            font-weight: 800;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 56, 96, 0.4);
        }

        /* Compass Rose Extension */
        #compass-rose {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 60px;
            height: 60px;
            z-index: 1000;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        @media (max-width: 767px) {
            #compass-rose {
                bottom: 100px;
            }
        }
    </style>
</head>

<body id="main-body">

    <div id="hud-top">
        <div class="hud-card">
            <div class="val-icon"><i data-lucide="zap"></i></div>
            <div class="val-text">
                <span class="val-lbl">🚀 السرعة الفورية</span>
                <div class="val-group"><span id="speed" class="val-main">0</span><span class="val-unit">كم/س</span>
                </div>
            </div>
        </div>
        <div class="hud-card" id="card-zone">
            <div class="val-icon"><i data-lucide="shield"></i></div>
            <div class="val-text">
                <span class="val-lbl">🛡️ الحالة التنظيمية</span>
                <span id="zone-check" class="val-main" style="color: var(--primary)">آمن</span>
            </div>
        </div>
        <div class="hud-card">
            <div class="val-icon"><i data-lucide="compass"></i></div>
            <div class="val-text">
                <span class="val-lbl">🧭 المسار الملاحي</span>
                <span id="heading" class="val-main">---</span>
            </div>
        </div>
        <div class="hud-card">
            <div class="val-icon"><i data-lucide="activity"></i></div>
            <div class="val-text">
                <span class="val-lbl">🌉 جودة البنية</span>
                <span class="val-main">عالية</span>
            </div>
        </div>
        <div class="hud-card">
            <div class="val-icon" id="gps-icon"><i data-lucide="satellite"></i></div>
            <div class="val-text">
                <span class="val-lbl">🛰️ دقة الإشارة (DOP)</span>
                <span id="gps-acc" class="val-main">--</span>
            </div>
        </div>
    </div>

    <div id="radar-panel">
        <div class="radar-card">
            <span class="val-lbl">🚨 أقرب منطقة خطر</span>
            <div id="radar-name" style="font-size: 13px; font-weight: 700; color: var(--warning); margin: 5px 0;">--
            </div>
            <div id="radar-dist" style="font-size: 24px; font-weight: 900; color: #fff;">0.00</div>
            <span class="val-unit">كيلومتر</span>
        </div>
        <div class="radar-card">
            <span class="val-lbl">⏳ وقت الاستجابة</span>
            <div style="font-size: 18px; font-weight: 800; color: var(--primary);">0.2ms</div>
        </div>
    </div>

    <div id="compass-rose" id="rose-wrap">
        <i data-lucide="navigation-2" style="color: var(--danger); width: 30px; height: 30px;"></i>
    </div>

    <div id="hud-controls">
        <button id="btn-start" class="btn-hub"><i data-lucide="play-circle"></i><span>بدأ التتبع</span></button>
        <button id="btn-nav" class="btn-hub"><i data-lucide="navigation"></i><span>ملاحة ذكية</span></button>
        <button id="btn-map-toggle" class="btn-hub"><i data-lucide="layers"></i><span>الخريطة</span></button>
    </div>

    <div id="nav-hint">نظام الحساب الملاحي مفعل<br><small>اختر وجهتك بعيداً عن المخالفات</small></div>

    <div id="vignette"></div>
    <div id="backdrop" onclick="closeAlert()"></div>
    <div id="lux-modal" class="lux-modal">
        <div style="font-size: 70px; margin-bottom: 25px;" id="alert-ico">🚨</div>
        <h3 id="alert-title" style="font-size: 26px; font-weight: 900; margin-bottom: 12px; color:#fff;">بروتوكول تحذير
        </h3>
        <p id="alert-msg" style="font-size: 17px; opacity: 0.9; line-height: 1.7; margin-bottom: 35px;"></p>
        <button class="btn-hub"
            style="background:#fff; color:#000; width:100%; justify-content:center; box-shadow:0 10px 20px rgba(0,0,0,0.3);"
            onclick="closeAlert()">أقر بالالتزام والامتثال</button>
    </div>

    <div id="map"></div>

    <script>
        lucide.createIcons();

        const zonesData = [
            {
                name: "النطاق الخارجي", color: "#FFD700",
                msg: "أنت الآن داخل النطاق الأصفر التحذيري. يرجى مراعاة اللوائح المرورية العامة.",
                coords: [[21.3114619988825, 40.26186344075736], [21.40202687265225, 40.27494792099847], [21.48579983331219, 40.24095331141512], [21.64940038404643, 40.44827723336594], [21.684579642463, 40.32089901815964], [21.66459070246338, 40.11539082282715], [21.69439943431459, 39.9607249550298], [21.54573321256773, 39.7969854069943], [21.54919003026366, 39.6818869810856], [21.44199252803352, 39.6200097803685], [21.38107485831209, 39.60254743133251], [21.33211026912623, 39.63515048619968], [21.30277739641977, 39.700517332689], [21.275512673309, 39.75447140988088], [21.27551229202982, 39.75490242031218], [21.27550906157185, 39.75791990213611], [21.24754742060833, 39.8141673038424], [21.24672795039132, 39.81628799964846], [21.24590573159184, 39.81840606228526], [21.24506677706235, 39.82347946977858], [21.23138846461335, 39.97914871792759], [21.3114619988825, 40.26186344075736]]
            },
            {
                name: "النطاق الاحمر", color: "#ff3860",
                msg: "تحذير: دخول النطاق المحظور أمنياً. غادر المنطقة فوراً لتفادي المخالفات والتبعات القانونية.",
                coords: [[21.51577097414043, 39.89780394502168], [21.53261348485238, 39.75571187580298], [21.47325831732579, 39.67469554471128], [21.41150094976036, 39.67713892574493], [21.36341468151538, 39.67191190533878], [21.32730259062046, 39.66748383181117], [21.28948613151358, 39.77330118006482], [21.27334085400369, 39.91045171649711], [21.28806702414635, 40.01243928181768], [21.30885857533626, 40.04117083514495], [21.51577097414043, 39.89780394502168]]
            }
        ];

        let currentLayer = 'sat';
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.4, 39.8], 11);
        const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        const streetLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png');

        document.getElementById('btn-map-toggle').onclick = () => {
            if (currentLayer === 'sat') { map.removeLayer(satLayer); streetLayer.addTo(map); currentLayer = 'street'; }
            else { map.removeLayer(streetLayer); satLayer.addTo(map); currentLayer = 'sat'; }
        };

        // Map Layers and Zones Setup
        const zonesLayer = L.featureGroup().addTo(map);

        zonesData.forEach((z, idx) => {
            const p = L.polygon(z.coords, { color: z.color, fillOpacity: 0.18, weight: 2.5 }).addTo(zonesLayer);
            p.zoneData = z;

            // Touch/Click Popup for Categories
            p.on('click', e => {
                L.popup().setLatLng(e.latlng).setContent(`<div style="font-family:'Cairo'; text-align:right; min-width:200px;">
                <h4 style="color:${z.color}; margin-bottom:5px;">${z.name}</h4>
                <p style="margin:0; font-size:13px; color:#555; line-height:1.4;">${z.msg}</p>
                <div style="font-size:11px; margin-top:8px; color:gray; opacity:0.8;">الفئة التنظيمية: ${idx}</div>
            </div>`).openOn(map);
                L.DomEvent.stopPropagation(e);
            });
        });

        // Geoman Control for Editing Zones
        map.pm.addControls({
            position: 'topleft', drawCircle: false, drawMarker: false,
            drawCircleMarker: false, drawPolyline: false, drawRectangle: false,
            drawPolygon: true, drawText: false, editMode: true, dragMode: true,
            cutPolygon: false, removalMode: true
        });

        map.on('pm:create', e => {
            const l = e.layer;
            const nz = {
                name: "منطقة مخصصة (تحذير)", color: "#ffdd57",
                msg: "منطقة محظورة تم تحديدها يدوياً بواسطة المهندس.",
                coords: l.getLatLngs()[0].map(c => [c.lat, c.lng])
            };
            l.zoneData = nz; l.setStyle({ color: nz.color, fillOpacity: 0.18, weight: 2.5 });

            l.on('click', evt => {
                L.popup().setLatLng(evt.latlng).setContent(`<div style="font-family:'Cairo'; text-align:right;">
                <h4 style="color:${nz.color}; margin-bottom:5px;">${nz.name}</h4>
                <p style="margin:0; font-size:13px; color:#555;">${nz.msg}</p>
            </div>`).openOn(map);
                L.DomEvent.stopPropagation(evt);
            });

            zonesData.push(nz); l.addTo(zonesLayer);
        });

        zonesLayer.on('pm:edit', e => {
            if (e.layer.zoneData) {
                e.layer.zoneData.coords = e.layer.getLatLngs()[0].map(c => [c.lat, c.lng]);
            }
        });

        let navMode = false; let routingControl = null; let destMark = null; let lastZ = null; let audioInited = false;

        function initAudio() { if (!audioInited) { const c = new (window.AudioContext || window.webkitAudioContext)(); c.resume(); audioInited = true; } }

        function playBell(t = 'i') {
            const c = new (window.AudioContext || window.webkitAudioContext)();
            const m = c.createGain(); m.connect(c.destination); m.gain.setValueAtTime(0.2, c.currentTime);
            if (t === 'd') {
                const o = c.createOscillator(); o.connect(m); o.type = 'sine'; o.frequency.setValueAtTime(300, c.currentTime);
                o.frequency.exponentialRampToValueAtTime(150, c.currentTime + 1); o.start(); o.stop(c.currentTime + 1);
            } else {
                [523, 659, 783].forEach((f, i) => {
                    const o = c.createOscillator(); const g = c.createGain(); o.connect(g).connect(m);
                    o.frequency.setValueAtTime(f, c.currentTime + i * 0.1); g.gain.setValueAtTime(0.3, c.currentTime + i * 0.1);
                    g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + i * 0.1 + 0.4); o.start(c.currentTime + i * 0.1); o.stop(c.currentTime + i * 0.1 + 0.4);
                });
            }
        }

        document.getElementById('btn-start').onclick = function () {
            initAudio();
            this.disabled = true;
            document.getElementById('gps-icon').style.color = 'var(--primary)';
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, speed, heading, accuracy } = pos.coords;
                document.getElementById('speed').textContent = speed ? (speed * 3.6).toFixed(0) : 0;
                document.getElementById('heading').textContent = heading ? heading.toFixed(0) + "°" : "---";
                document.getElementById('gps-acc').textContent = (accuracy / 10).toFixed(1);
                if (heading) document.getElementById('compass-rose').style.transform = `rotate(${heading}deg)`;

                const latlng = [latitude, longitude];
                if (!window.uM) window.uM = L.marker(latlng, { icon: L.divIcon({ className: 'u', html: '<div class="user-dot"></div>', iconSize: [20, 20], iconAnchor: [10, 10] }) }).addTo(map);
                else window.uM.setLatLng(latlng);

                if (!navMode && !routingControl) map.flyTo(latlng, 16);
                checkZones(latitude, longitude);
                runRadar(latitude, longitude);
            }, null, { enableHighAccuracy: true });
            playBell();
        };

        function checkZones(la, ln) {
            let f = zonesData.find(z => isP(la, ln, z.coords));
            const lbl = document.getElementById('zone-check'); const b = document.getElementById('main-body');
            if (f) {
                lbl.textContent = f.name; lbl.style.color = f.color;
                if (lastZ !== f.name) {
                    lastZ = f.name;
                    if (f.color === "#ff3860") { b.classList.add('is-danger'); showModal("بروتوكول تحذير", f.msg, "🚨"); playBell('d'); }
                    else { b.classList.remove('is-danger'); showModal("تنبيه تنظيمي", f.msg, "⚠️"); playBell('i'); }
                }
            } else { lbl.textContent = "نطاق آمن"; lbl.style.color = "var(--primary)"; b.classList.remove('is-danger'); lastZ = null; }
        }

        function runRadar(la, ln) {
            const p = turf.point([ln, la]); let md = Infinity; let mn = "--";
            zonesData.forEach(z => {
                let cs = z.coords.map(c => [c[1], c[0]]); cs.push(cs[0]);
                let d = turf.distance(p, turf.pointOnFeature(turf.polygon([cs])));
                if (d < md) { md = d; mn = z.name; }
            });
            document.getElementById('radar-dist').textContent = md.toFixed(2);
            document.getElementById('radar-name').textContent = mn;
        }

        function isP(la, ln, py) {
            let i = false; for (let a = 0, b = py.length - 1; a < py.length; b = a++) {
                if (((py[a][1] > ln) != (py[b][1] > ln)) && (la < (py[b][0] - py[a][0]) * (ln - py[a][1]) / (py[b][1] - py[a][1]) + py[a][0])) i = !i;
            } return i;
        }

        function showModal(t, m, e) {
            document.getElementById('alert-title').textContent = t; document.getElementById('alert-msg').textContent = m;
            document.getElementById('alert-ico').textContent = e;
            document.getElementById('backdrop').style.display = 'block'; document.getElementById('lux-modal').style.display = 'block';
        }

        function closeAlert() { document.getElementById('backdrop').style.display = 'none'; document.getElementById('lux-modal').style.display = 'none'; }

        document.getElementById('btn-nav').onclick = () => { if (!window.uM) return alert("ابدأ التتبع!"); navMode = true; document.getElementById('nav-hint').style.display = 'block'; };

        map.on('click', e => {
            if (!navMode) return;
            if (zonesData.some(z => z.color === "#ff3860" && isP(e.latlng.lat, e.latlng.lng, z.coords))) return showModal("خطأ ملاحي", "الوجهة تقع في منطقة محظورة.", "🚫");
            if (destMark) map.removeLayer(destMark); destMark = L.marker(e.latlng).addTo(map);
            document.getElementById('nav-hint').style.display = 'none'; navMode = false;
            if (routingControl) map.removeControl(routingControl);
            const s = window.uM.getLatLng();
            const detour = calcD(s, e.latlng);
            routingControl = L.Routing.control({
                waypoints: detour.w, router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                lineOptions: { styles: [{ color: '#00d1b2', weight: 6, dashArray: '5, 12' }] },
                show: false, createMarker: () => null
            }).addTo(map);
        });

        function calcD(s, e) {
            const sp = turf.point([s.lng, s.lat]); const ep = turf.point([e.lng, e.lat]);
            const l = turf.lineString([sp.geometry.coordinates, ep.geometry.coordinates]);
            let ws = [];
            zonesData.filter(z => z.color === "#ff3860" || z.name.includes("مخصصة")).forEach(z => {
                if (!z.coords || z.coords.length < 3) return;
                let cs = z.coords.map(c => [c[1], c[0]]); cs.push(cs[0]);
                let py = turf.polygon([cs]);
                if (turf.booleanIntersects(l, py)) {
                    let b = turf.buffer(turf.convex(turf.featureCollection([py])), 5, { units: 'kilometers' });
                    let r = b.geometry.coordinates[0];

                    // Superior Detour Algorithm: Find 3 anchor points on the buffer
                    let ms = Infinity; let bi = 0;
                    r.forEach((p, i) => {
                        let d = turf.distance(sp, turf.point(p)) + turf.distance(ep, turf.point(p));
                        if (d < ms) { ms = d; bi = i; }
                    });

                    // Pick points along the perimeter to ensure road adherence
                    let st = Math.max(1, Math.floor(r.length / 8));
                    let p1 = r[(bi - st + r.length) % r.length];
                    let p2 = r[bi];
                    let p3 = r[(bi + st) % r.length];

                    if (turf.distance(sp, turf.point(p1)) < turf.distance(sp, turf.point(p3))) {
                        ws.push(L.latLng(p1[1], p1[0])); ws.push(L.latLng(p2[1], p2[0])); ws.push(L.latLng(p3[1], p3[0]));
                    } else {
                        ws.push(L.latLng(p3[1], p3[0])); ws.push(L.latLng(p2[1], p2[0])); ws.push(L.latLng(p1[1], p1[0]));
                    }
                }
            });
            return { w: [s, ...ws, e] };
        }
    </script>
