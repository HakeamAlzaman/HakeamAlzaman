// ================= SNAP =================
async function snap(coord) {
    const url = `https://router.project-osrm.org/nearest/v1/driving/${coord[1]},${coord[0]}`;
    const res = await fetch(url);
    const data = await res.json();
    return [data.waypoints[0].location[1], data.waypoints[0].location[0]];
}

// ================= ROUTE =================
async function getRoute(points) {

    let str = points.map(p => `${p[1]},${p[0]}`).join(";");

    const url = `https://router.project-osrm.org/route/v1/driving/${str}?overview=full&geometries=geojson`;

    const res = await fetch(url);
    const data = await res.json();

    return data.routes[0];
}

// ================= ZONE CHECK =================
function crossesZone(coords) {

    const line = turf.lineString(coords.map(c => [c[1], c[0]]));

    for (let z of zonesData) {

        let poly = turf.polygon([
            [...z.coords.map(c=>[c[1],c[0]]), [z.coords[0][1],z.coords[0][0]]]
        ]);

        if (turf.booleanIntersects(line, poly)) return true;
    }

    return false;
}

// ================= DETOURS =================
function getDetours() {
    let pts = [];
    zonesData.forEach(z => z.coords.forEach(p => pts.push(p)));
    return pts;
}

// ================= BUILD ROUTE =================
async function buildRoute() {

routeLayer.clearLayers();

let src = document.getElementById("source").value.split(',').map(Number);
let dst = document.getElementById("destination").value.split(',').map(Number);

let s = await snap(src);
let d = await snap(dst);

// Pins
L.marker(s).addTo(routeLayer).bindPopup("📍 Start");
L.marker(d).addTo(routeLayer).bindPopup("🎯 Destination");

// get multiple routes
const url = `https://router.project-osrm.org/route/v1/driving/${s[1]},${s[0]};${d[1]},${d[0]}?alternatives=true&overview=full&geometries=geojson`;
const res = await fetch(url);
const data = await res.json();

if (!data.routes || data.routes.length === 0) {
    alert("No route from OSRM");
    return;
}

let bestRoute = null;
let bestScore = Infinity;

data.routes.forEach(r => {

    let coords = r.geometry.coordinates.map(c => [c[1], c[0]]);

    // count how much it intersects zones
    let penalty = computeZonePenalty(coords);

    let score = r.distance + penalty;

    if (score < bestScore) {
        bestScore = score;
        bestRoute = coords;
    }
});

draw(bestRoute);
}
function computeZonePenalty(coords) {

let penalty = 0;

const line = turf.lineString(coords.map(c => [c[1], c[0]]));

zonesData.forEach(z => {

    let poly = turf.polygon([
        [...z.coords.map(c=>[c[1],c[0]]), [z.coords[0][1],z.coords[0][0]]]
    ]);

    if (turf.booleanIntersects(line, poly)) {
        penalty += 50000; // 🔥 strong penalty
    }
});

return penalty;
}
// ================= DRAW + CAR =================
function draw(coords, meta) {

    L.polyline(coords,{color:'cyan',weight:6}).addTo(routeLayer);

    map.fitBounds(L.polyline(coords).getBounds());

    animateCar(coords, meta);
}

// ================= CAR ANIMATION =================
function animateCar(coords, meta) {

    let i = 0;

    if (carMarker) routeLayer.removeLayer(carMarker);

    carMarker = L.marker(coords[0]).addTo(routeLayer);

    let totalDist = meta.distance / 1000;
    let totalTime = meta.duration / 60;

    let interval = setInterval(() => {

        if (i >= coords.length) {
            clearInterval(interval);
            return;
        }

        carMarker.setLatLng(coords[i]);

        let progress = i / coords.length;

        document.getElementById("distance").textContent = (totalDist * progress).toFixed(2);
        document.getElementById("time").textContent = (totalTime * (1-progress)).toFixed(1);
        document.getElementById("speed").textContent = (60 + Math.random()*20).toFixed(0);

        i++;

    }, 100);
}
