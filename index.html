<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <title>نظام الملاحة الذكي والتوعية المكانية</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a12; color: white; }
        
        #top-bar { position: fixed; top: 0; left: 0; right: 0; min-height: 90px; background: rgba(16, 16, 30, 0.95); border-bottom: 2px solid #00b894; z-index: 1000; display: flex; flex-direction: column; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .dashboard { display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 10px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 12px; border: 1px solid rgba(0,184,148,0.3); text-align: center; min-width: 100px; }
        .stat-label { font-size: 11px; color: #00b894; display: block; margin-bottom: 2px; }
        .stat-value { font-size: 16px; font-weight: bold; color: #fff; }

        .controls { display: flex; gap: 8px; margin-top: 8px; justify-content: center; }
        .btn { border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 12px; transition: 0.3s; display: flex; align-items: center; gap: 5px; }
        #btn-start { background: #00b894; color: white; }
        #btn-nav { background: #3498db; color: white; }
        #btn-save { background: #e67e22; color: white; display: none; }
        .btn:disabled { background: #444; cursor: not-allowed; }

        #map-container { position: absolute; top: 120px; left: 0; right: 0; bottom: 0; z-index: 1; }
        #map { height: 100%; width: 100%; background: #1a1a2e; }

        /* نافذة التنبيهات */
        #backdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9998; backdrop-filter: blur(8px); }
        .legal-alert { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 420px; padding: 30px; border-radius: 25px; z-index: 9999; text-align: center; border: 2px solid #ff4757; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { transform: translate(-50%, -20%); opacity: 0; } to { transform: translate(-50%, -50%); opacity: 1; } }
        
        .alert-icon { font-size: 55px; margin-bottom: 10px; display: block; }
        .legal-msg { font-size: 18px; line-height: 1.6; margin: 15px 0; font-weight: 500; }
        .close-btn { background: white; color: #000; padding: 12px 40px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }

        /* تأثير الوميض المرعب للنطاق الأحمر */
        @keyframes flashRed {
            0% { box-shadow: 0 0 20px #ff0000; }
            50% { box-shadow: 0 0 80px #ff0000, inset 0 0 30px #ff0000; }
            100% { box-shadow: 0 0 20px #ff0000; }
        }
        .critical-alert { animation: flashRed 1s infinite !important; border-width: 4px !important; }

        #nav-hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #3498db; padding: 10px 20px; border-radius: 30px; z-index: 1001; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold; }

        /* إخفاء واجهة التوجيه النصية الخاصة بالمكتبة (لأننا نحتاج المسار على الخريطة فقط) */
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="dashboard">
        <div class="stat-box"><span class="stat-label">🚀 السرعة</span><span id="speed" class="stat-value">0</span><small>كم/س</small></div>
        <div class="stat-box"><span class="stat-label">🧭 الاتجاه</span><span id="heading" class="stat-value">---</span></div>
        <div class="stat-box"><span class="stat-label">🎯 المنطقة الحالية</span><span id="zone-check" class="stat-value" style="color:#00b894">آمنة</span></div>
        <div class="stat-box"><span class="stat-label">📡 الحالة</span><span id="gps-status" class="stat-value" style="color:#ff4757">●</span></div>
    </div>
    <div class="controls">
        <button id="btn-start" class="btn">📡 تفعيل التتبع</button>
        <button id="btn-nav" class="btn">📍 مسار على الطريق</button>
        <button id="btn-save" class="btn">💾 حفظ المسار KML</button>

</div>

<div id="nav-hint">قم بالنقر على الخريطة لتحديد وجهتك...</div>

    function playAlertSound(isCritical = false) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (isCritical) {
            for(let i=0; i<3; i++) {
                setTimeout(() => {
                    let osc = audioCtx.createOscillator();
                    let gainNode = audioCtx.createGain();
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                }, i * 200);
            }
        } else {
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    document.getElementById('btn-start').onclick = function() {

        this.disabled = true;
        document.getElementById('btn-save').style.display = 'block';
        document.getElementById('gps-status').style.color = '#00ff88';

        if ('wakeLock' in navigator) navigator.wakeLock.request('screen').then(lock => wakeLock = lock);

        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude, speed, heading } = pos.coords;
            const kmh = speed ? (speed * 3.6).toFixed(1) : 0;
            
            document.getElementById('speed').textContent = kmh;
            document.getElementById('heading').textContent = heading ? heading.toFixed(0) + "°" : "---";
            
            const currentPos = [latitude, longitude];
            pathCoords.push(currentPos);
            pathLine.setLatLngs(pathCoords);
            
            if (window.userMarker) map.removeLayer(window.userMarker);
            window.userMarker = L.circleMarker(currentPos, { radius: 10, color: '#fff', fillColor: '#0078ff', fillOpacity: 1 }).addTo(map);
            
            if (!navMode) map.setView(currentPos, 15);
            checkZones(latitude, longitude);
        }, null, { enableHighAccuracy: true });

    document.getElementById('btn-nav').onclick = function() {
        if (!window.userMarker) {
            alert("يرجى تفعيل التتبع أولاً لتحديد نقطة انطلاقك!");
            return;
        }
        navMode = true;
        document.getElementById('nav-hint').style.display = 'block';
    };

    map.on('click', function(e) {
        if (!navMode) return;
        
        if (destinationMarker) map.removeLayer(destinationMarker);
        destinationMarker = L.marker(e.latlng).addTo(map).bindPopup("وجهتك").openPopup();
        
        document.getElementById('nav-hint').style.display = 'none';
        navMode = false;
        
        // إزالة مسار الطرق القديم إن وجد
        if (routingControl) {
            map.removeControl(routingControl);
        }
        
        // 1. استخدام الخوارزمية الجغرافية لاكتشاف وتحديد نقاط الالتفاف (Waypoints) خارج المضلعات المحظورة
        let safeRoutePoints = getSafeRoute(window.userMarker.getLatLng(), e.latlng);
        
        // 2. إرسال النقاط الآمنة لمحرك OSRM ليرسم المسار المتعرج على الشوارع الحقيقية بين هذه النقاط
        routingControl = L.Routing.control({
            waypoints: safeRoutePoints,
            router: L.Routing.osrmv1({
                serviceUrl: 'https://router.project-osrm.org/route/v1' // محرك التوجيه المجاني
            }),
            lineOptions: {
                styles: [{color: '#00ff88', opacity: 0.8, weight: 6, dashArray: '10, 10'}]
            },
            createMarker: function() { return null; }, // إخفاء العلامات الافتراضية للمكتبة
            show: false, // إخفاء لوحة التوجيه النصية
            addWaypoints: false // منع المستخدم من سحب الخط
        }).addTo(map);
        
        if (safeRoutePoints.length > 2) {
            showLegalAlert("✅ تم تعديل مسارك برمجياً لتفادي المناطق المحظورة، سيتم الآن رسم المسار عبر شبكة الطرق الآمنة.", "#00b894", false);
        }
    });

    // خوارزمية جغرافية لإيجاد نقاط آمنة تتجاوز المضلعات (تقوم بتوليد Waypoints لمحرك OSRM)
    function getSafeRoute(start, end, depth = 0) {
        if (depth > 5) return [start, end];

        let startPt = turf.point([start.lng, start.lat]);
        let endPt = turf.point([end.lng, end.lat]);
        let line = turf.lineString([startPt.geometry.coordinates, endPt.geometry.coordinates]);

        for (let i = 0; i < zonesData.length; i++) {
            let coords = zonesData[i].coords.map(c => [c[1], c[0]]);
            if (coords[0][0] !== coords[coords.length-1][0] || coords[0][1] !== coords[coords.length-1][1]) {
                coords.push(coords[0]);
            }
            let poly = turf.polygon([coords]);

            // إذا كان الخط المباشر يقطع أي منطقة محظورة
            if (turf.booleanIntersects(line, poly)) {
                let center = turf.centroid(poly);
                let midpoint = turf.midpoint(startPt, endPt);
                
                let bearing = turf.bearing(center, midpoint);
                // رفعنا مسافة الالتفاف إلى 6 كم لضمان إخراج نقطة الـ Waypoint خارج النطاق الكبير 
                // ليقوم محرك الطرق باختيار شوارع لا تقطع المنطقة
                let detourPt = turf.destination(center, 6, bearing, {units: 'kilometers'});
                let detourLatLng = L.latLng(detourPt.geometry.coordinates[1], detourPt.geometry.coordinates[0]);

                let part1 = getSafeRoute(start, detourLatLng, depth + 1);
                let part2 = getSafeRoute(detourLatLng, end, depth + 1);
                
                part2.shift();
                return part1.concat(part2);
            }
        }
        return [start, end];
    }

    function checkZones(lat, lng) {
        let foundZone = null;
        zonesData.forEach(z => {
            if (isPointInPoly(lat, lng, z.coords)) foundZone = z;
        });

        const label = document.getElementById('zone-check');
        const alertIcon = document.getElementById('alert-icon-display');
        const modal = document.getElementById('legal-modal');

        if (foundZone) {
            label.textContent = foundZone.name;
            label.style.color = foundZone.color;
            
            if (lastZoneName !== foundZone.name) {
                lastZoneName = foundZone.name;
                
                let isCritical = (foundZone.name === "النطاق الخطر" || foundZone.name === "النطاق الاحمر (مخالفات فورية)");
                playAlertSound(isCritical);
                
                if (isCritical) {
                    alertIcon.textContent = "🚨";
                    modal.classList.add('critical-alert');
                    document.getElementById('alert-title').textContent = "تحذير أمني عالي";
                    document.getElementById('alert-title').style.color = "#ff0000";
                } else {
                    alertIcon.textContent = "⚠️";
                    modal.classList.remove('critical-alert');
                    document.getElementById('alert-title').textContent = "تنبيه تنظيمي";
                    document.getElementById('alert-title').style.color = "#fff";
                }
                
                showLegalAlert(foundZone.msg, foundZone.color, isCritical);
            }
        } else {
            label.textContent = "منطقة آمنة";
            label.style.color = "#00b894";
            lastZoneName = null;
        }
    }

    function isPointInPoly(lat, lng, poly) {
        let inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            let xi = poly[i][0], yi = poly[i][1], xj = poly[j][0], yj = poly[j][1];
            if (((yi > lng) != (yj > lng)) && (lat < (xj - xi) * (lng - yi) / (yj - yi) + xi)) inside = !inside;
        }
        return inside;
    }

    function showLegalAlert(text, color, isCritical) {
        document.getElementById('backdrop').style.display = 'block';
        const modal = document.getElementById('legal-modal');
        modal.style.display = 'block';
        
        if(isCritical) {
            modal.style.borderColor = '#ff0000';
            modal.style.background = `linear-gradient(135deg, rgba(255,0,0,0.3) 0%, rgba(16,16,30,0.95) 100%)`;
        } else {
            modal.style.borderColor = color;
            modal.style.background = `linear-gradient(135deg, ${color}33 0%, rgba(16,16,30,0.95) 100%)`;
        }
        
        document.getElementById('legal-text').textContent = text;
    }

    function closeAlert() {
        document.getElementById('backdrop').style.display = 'none';
        const modal = document.getElementById('legal-modal');
        modal.style.display = 'none';
        modal.classList.remove('critical-alert');
    }

    document.getElementById('btn-save').onclick = function() {
        let coords = pathCoords.map(p => `${p[1]},${p[0]},0`).join(' ');
        let kml = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><Placemark><name>مساري</name><LineString><coordinates>${coords}</coordinates></LineString></Placemark></Document></kml>`;
        let blob = new Blob([kml], {type: "application/vnd.google-earth.kml+xml"});
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url; a.download = "MyTrack.kml"; a.click();
    };
</script>
</body>
