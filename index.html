<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <title>نظام المراقبة والتتبع المكاني</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a12; color: white; }
        
        #top-bar { position: fixed; top: 0; left: 0; right: 0; min-height: 90px; background: rgba(16, 16, 30, 0.95); border-bottom: 2px solid #00b894; z-index: 1000; display: flex; flex-direction: column; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .dashboard { display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 10px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 8px 20px; border-radius: 12px; border: 1px solid rgba(0,184,148,0.3); text-align: center; min-width: 120px; }
        .stat-label { font-size: 12px; color: #aaa; display: block; margin-bottom: 5px; }
        .stat-value { font-size: 16px; font-weight: bold; color: #fff; }

        .controls { display: flex; gap: 10px; margin-top: 10px; justify-content: center; flex-wrap: wrap; }
        .btn { border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #btn-start { background: linear-gradient(135deg, #00b894 0%, #00a085 100%); color: white; }
        #btn-settings { background: #34495e; color: white; border: 1px solid #576574; }
        .btn:disabled { background: #00b894; cursor: not-allowed; box-shadow: none; opacity: 0.9; }

        #map-container { position: absolute; top: 120px; left: 0; right: 0; bottom: 0; z-index: 1; }
        #map { height: 100%; width: 100%; background: #1a1a2e; }

        /* نقطة الموقع المضمونة العرض */
        .safe-user-marker {
            border-radius: 50%;
            border: 3px solid #ffffff;
            box-shadow: 0 0 15px rgba(0,0,0,0.8), inset 0 0 5px rgba(0,0,0,0.3);
            transition: background-color 0.4s ease;
        }

        /* نافذة التنبيهات والمودال */
        #backdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9998; backdrop-filter: blur(8px); }
        
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 420px; background: #161625; padding: 30px; border-radius: 20px; z-index: 9999; text-align: center; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.7); color: white; }
        
        /* تنبيه قانوني */
        .legal-alert { border: 2px solid #ff4757; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { transform: translate(-50%, -20%); opacity: 0; } to { transform: translate(-50%, -50%); opacity: 1; } }
        
        .alert-icon { font-size: 55px; margin-bottom: 10px; display: block; }
        .legal-msg { font-size: 16px; line-height: 1.6; margin: 15px 0; font-weight: 500; white-space: pre-wrap; }
        .close-btn { background: white; color: #000; padding: 12px 40px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }

        @keyframes flashRed {
            0% { box-shadow: 0 0 20px #ff0000; }
            50% { box-shadow: 0 0 80px #ff0000, inset 0 0 30px #ff0000; }
            100% { box-shadow: 0 0 20px #ff0000; }
        }
        .critical-alert { animation: flashRed 1s infinite !important; border-width: 4px !important; }

        /* إعدادات المناطق */
        .zones-list { text-align: right; max-height: 300px; overflow-y: auto; margin: 20px 0; padding-right: 10px; }
        .zone-option { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 15px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 8px; cursor: pointer; }
        .zone-option input[type="checkbox"] { transform: scale(1.3); cursor: pointer; accent-color: #00b894; }
        .zone-color-box { width: 16px; height: 16px; border-radius: 4px; display: inline-block; border: 1px solid rgba(255,255,255,0.5); }
        .save-settings-btn { background: #00b894; color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>

<div id="top-bar">
    <div class="dashboard">
        <div class="stat-box"><span class="stat-label">🚀 السرعة</span><span id="speed" class="stat-value">0</span><small>كم/س</small></div>
        <div class="stat-box"><span class="stat-label">🎯 المنطقة الحالية</span><span id="zone-check" class="stat-value" style="color:#00ff88">منطقة آمنة</span></div>

    </div>
    <div class="controls">

    </div>
</div>

<div id="backdrop"></div>

<div id="legal-modal" class="modal legal-alert">

    <p id="legal-text" class="legal-msg"></p>
    <button class="close-btn" onclick="closeAlert()">علم، سألتزم</button>
</div>

<div id="settings-modal" class="modal">

    let polygonsLayer = L.layerGroup();
    let map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.4, 39.8], 10);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    polygonsLayer.addTo(map);

    // دالة رسم المناطق المفعلة فقط
    function renderZones() {
        polygonsLayer.clearLayers();
        masterZonesData.forEach(z => {
            if (activeZones.includes(z.name)) {
                let fillOp = 0.15;
                let borderWeight = 2;
                if (z.color === "#ff0000") {
                    fillOp = 0.25; 
                    borderWeight = 3;
                } else if (z.color === "#FFD700") {
                    fillOp = 0.08; 
                }
                L.polygon(z.coords, { color: z.color, fillOpacity: fillOp, weight: borderWeight }).addTo(polygonsLayer).bindPopup(z.name);
            }
        });
    }
    
    // رسم المناطق عند بداية التشغيل
    renderZones();

    // تهيئة قائمة الاختيارات في المودال
    function initSettingsModal() {
        const container = document.getElementById('zones-list-container');
        container.innerHTML = '';
        masterZonesData.forEach(z => {
            const isChecked = activeZones.includes(z.name) ? 'checked' : '';
            container.innerHTML += `
                <label class="zone-option">
                    <input type="checkbox" value="${z.name}" ${isChecked}>
                    <span class="zone-color-box" style="background-color: ${z.color};"></span>
                    ${z.name}
                </label>
            `;
        });
    }

    function openSettings() {
        initSettingsModal();
        document.getElementById('backdrop').style.display = 'block';
        document.getElementById('settings-modal').style.display = 'block';
    }

    function saveSettings() {
        const checkboxes = document.querySelectorAll('#zones-list-container input[type="checkbox"]');
        activeZones = [];
        checkboxes.forEach(cb => {
            if (cb.checked) activeZones.push(cb.value);
        });
        
        // إعادة رسم الخريطة وإغلاق المودال

        document.getElementById('backdrop').style.display = 'none';
        document.getElementById('settings-modal').style.display = 'none';

        if (window.userMarker) {
            let latlng = window.userMarker.getLatLng();
            checkZones(latlng.lat, latlng.lng);
        }
    }

    // بناء أيقونة سيارة HTML نقية لتخطي أي قيود أمنية (CSP) في المتصفحات
    function getMarkerIcon(colorCode) {
        return L.divIcon({
            className: '',
            html: `<div class="safe-user-marker" style="background-color: ${colorCode}; width: 22px; height: 22px;"></div>`,
            iconSize: [22, 22],
            iconAnchor: [11, 11]
        });
    }

    let wakeLock = null;
    let lastAlertZoneName = null;
    let lastAlertLocation = null;
    let watchId = null;

    function playAlertSound(isCritical = false) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (isCritical) {
                for(let i=0; i<3; i++) {
                    setTimeout(() => {
                        let osc = audioCtx.createOscillator();
                        let gainNode = audioCtx.createGain();
                        osc.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                        osc.start();
                        osc.stop(audioCtx.currentTime + 0.15);
                    }, i * 200);
                }
            } else {
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        } catch(e) {}
    }

    document.getElementById('btn-start').onclick = function() {
        if (!navigator.geolocation) {
            alert("GPS غير مدعوم في جهازك أو متصفحك");
            return;
        }
        
        const btn = this;
        btn.disabled = true;
        btn.textContent = "جاري تحديد الموقع...";
        document.getElementById('gps-status').textContent = "جاري البحث";
        document.getElementById('gps-status').style.color = '#FFD700';

        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').then(lock => wakeLock = lock).catch(()=>{});
        }

        const geoOptions = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };

        const handleError = (err) => {
            console.warn(`ERROR(${err.code}): ${err.message}`);
            btn.disabled = false;
            btn.textContent = "📡 تفعيل تحديد الموقع";
            document.getElementById('gps-status').textContent = "فشل التحديد";
            document.getElementById('gps-status').style.color = '#ff4757';
            
            if(err.code === 1) alert("الرجاء السماح للمتصفح بالوصول إلى موقعك.");
            else alert("تعذر تحديد الموقع. يرجى التأكد من تفعيل الـ GPS والمحاولة مجدداً.");
        };

        // طلب أولي لضمان سرعة الاستجابة ورسم النقطة
        navigator.geolocation.getCurrentPosition((pos) => {
            btn.textContent = "مفعل";
            document.getElementById('gps-status').textContent = "متصل";
            document.getElementById('gps-status').style.color = '#00ff88';
            updatePosition(pos);
            
            // بدء التتبع المستمر بعد التحديد الأول
            if(watchId) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition(updatePosition, handleError, geoOptions);
        }, handleError, geoOptions);
    };

    function updatePosition(pos) {
        const { latitude, longitude, speed, heading } = pos.coords;
        const kmh = speed ? (speed * 3.6).toFixed(1) : 0;
        
        document.getElementById('speed').textContent = kmh;
        document.getElementById('heading').textContent = heading ? heading.toFixed(0) + "°" : "---";
        
        const currentPos = [latitude, longitude];
        
        // رسم النقطة الآمنة والمضمونة
        if (!window.userMarker) {
            window.userMarker = L.marker(currentPos, { icon: getMarkerIcon('#00ff88'), zIndexOffset: 1000 }).addTo(map);
            map.setView(currentPos, 16); 
        } else {
            window.userMarker.setLatLng(currentPos);
            map.setView(currentPos, map.getZoom()); 
        }
        
        checkZones(latitude, longitude);
    }

    function checkZones(lat, lng) {
        let currentLatLng = L.latLng(lat, lng);
        let foundZone = null;
        
        // فحص فقط المناطق المفعلة من الإعدادات
        let activeZonesData = masterZonesData.filter(z => activeZones.includes(z.name));

        activeZonesData.forEach(z => {
            if (isPointInPoly(lat, lng, z.coords)) foundZone = z;
        });

        const label = document.getElementById('zone-check');
        const alertIcon = document.getElementById('alert-icon-display');
        const modal = document.getElementById('legal-modal');

        // تحديث لون السيارة مباشرة
        let carColor = foundZone ? foundZone.color : '#00ff88'; 
        if (window.userMarker) {
            window.userMarker.setIcon(getMarkerIcon(carColor));
        }

        if (foundZone) {
            label.textContent = foundZone.name;
            label.style.color = foundZone.color;
            
            let shouldShowAlert = false;
            
            if (lastAlertZoneName !== foundZone.name) {
                shouldShowAlert = true;
            } else if (lastAlertLocation) {
                // خوارزمية الـ 5 كيلومتر
                let distanceMeters = currentLatLng.distanceTo(lastAlertLocation);
                if (distanceMeters >= 5000) {
                    shouldShowAlert = true;
                }
            }

            if (shouldShowAlert) {
                lastAlertZoneName = foundZone.name;
                lastAlertLocation = currentLatLng; 
                
                let isCritical = (foundZone.color === "#ff0000");
                playAlertSound(isCritical);
                
                if (isCritical) {
                    alertIcon.textContent = "🚨";
                    modal.classList.add('critical-alert');
                    document.getElementById('alert-title').textContent = "تحذير أمني عالي";
                    document.getElementById('alert-title').style.color = "#ff0000";
                } else {
                    alertIcon.textContent = "⚠️";
                    modal.classList.remove('critical-alert');
                    document.getElementById('alert-title').textContent = "تنبيه تنظيمي";
                    document.getElementById('alert-title').style.color = "#fff";
                }
                
                showLegalAlert(foundZone.msg, foundZone.color, isCritical);
            }
        } else {
            label.textContent = "منطقة آمنة";
            label.style.color = "#00ff88";
            lastAlertZoneName = null; 
        }
    }

    function isPointInPoly(lat, lng, poly) {
        let inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            let xi = poly[i][0], yi = poly[i][1], xj = poly[j][0], yj = poly[j][1];
            if (((yi > lng) != (yj > lng)) && (lat < (xj - xi) * (lng - yi) / (yj - yi) + xi)) inside = !inside;
        }
        return inside;
    }

    function showLegalAlert(text, color, isCritical) {
        document.getElementById('backdrop').style.display = 'block';
        const modal = document.getElementById('legal-modal');
        modal.style.display = 'block';
        
        if(isCritical) {
            modal.style.borderColor = '#ff0000';
            modal.style.background = `linear-gradient(135deg, rgba(255,0,0,0.3) 0%, rgba(16,16,30,0.95) 100%)`;
        } else {
            modal.style.borderColor = color;
            modal.style.background = `linear-gradient(135deg, ${color}33 0%, rgba(16,16,30,0.95) 100%)`;
        }
        
        document.getElementById('legal-text').textContent = text;
    }

    function closeAlert() {
        document.getElementById('backdrop').style.display = 'none';
        document.getElementById('legal-modal').style.display = 'none';
        document.getElementById('settings-modal').style.display = 'none';
        const modal = document.getElementById('legal-modal');
        modal.classList.remove('critical-alert');
    }
</script>
</body>
