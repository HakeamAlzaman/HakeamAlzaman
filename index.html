<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <title>Precision Pro Navigation | HUD</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #00f2ff;
            --danger: #ff0044;
            --warning: #ffcc00;
            --glass: rgba(10, 10, 15, 0.88);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Cairo', sans-serif; background: #000; color: #fff; }

        #map { position: absolute; inset: 0; z-index: 0; }

        /* HUD Top Bar */
        #hud-top {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 15px; width: 95%; max-width: 1400px; pointer-events: none;
        }

        .hud-card {
            background: var(--glass); backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 15px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: auto;
        }

        .hud-icon { color: var(--primary); width: 28px; height: 28px; }

        .hud-val-box { display: flex; flex-direction: column; }
        .hud-label { font-size: 11px; opacity: 0.5; font-weight: 700; text-transform: uppercase; }
        .hud-main-val { font-size: 16px; font-weight: 900; }

        /* Gauge Speedometer */
        .speed-gauge { position: relative; width: 70px; height: 70px; }
        .gauge-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .gauge-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 6; }
        .gauge-progress { 
            fill: none; stroke: var(--primary); stroke-width: 6; 
            stroke-linecap: round; stroke-dasharray: 220; stroke-dashoffset: 220;
            transition: stroke-dashoffset 0.4s ease; filter: drop-shadow(0 0 5px var(--primary));
        }
        .speed-text-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; }

        /* Search Bar */
        #search-box {
            position: fixed; top: 130px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 400px; max-width: 90%;
        }
        .search-input {
            width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 12px 20px 12px 50px; color: #fff;
            font-family: 'Cairo'; font-size: 14px; outline: none; backdrop-filter: blur(20px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .search-ic { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); width: 20px; }

        /* Navigation Side Card */
        #nav-card {
            position: fixed; right: 25px; top: 230px; z-index: 1000;
            width: 260px; background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; display: none; backdrop-filter: blur(30px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); animation: slideIn 0.4s ease;
        }
        @keyframes slideIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Permit Toggle Button */
        #permit-btn {
            position: fixed; top: 30px; left: 30px; z-index: 2000;
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 50px; padding: 10px 20px; display: flex; align-items: center;
            gap: 10px; cursor: pointer; transition: 0.3s;
        }
        #permit-btn.authorized { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,242,255,0.2); }

        /* Alerts & Effects */
        #vignette { position: fixed; inset: 0; pointer-events: none; z-index: 1500; transition: 0.5s; }
        .red-alert #vignette { animation: flashRed 1.5s infinite; }
        @keyframes flashRed { 0%, 100% { box-shadow: inset 0 0 50px rgba(255,0,68,0); } 50% { box-shadow: inset 0 0 150px rgba(255,0,68,0.4); } }

        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 3000; backdrop-filter: blur(10px); align-items: center; justify-content: center;
        }
        .modal {
            background: #111; border: 1px solid var(--glass-border); padding: 40px;
            border-radius: 30px; width: 400px; text-align: center; box-shadow: 0 50px 100px #000;
        }

        /* User Dot */
        .user-marker { width: 24px; height: 24px; background: #fff; border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 20px var(--primary); position: relative; }
        .user-marker::after { content: ''; position: absolute; inset: -15px; background: var(--primary); opacity: 0.2; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(3.5); opacity: 0; } }

        [dir="rtl"] .search-input { padding: 12px 50px 12px 20px; }
        [dir="rtl"] .search-ic { right: 18px; left: auto; }
    </style>
</head>
<body>

    <div id="permit-btn" onclick="togglePermit()">
        <i id="permit-icon" data-lucide="shield-alert" style="color: var(--danger)"></i>
        <span id="permit-text" style="font-weight: 800;">غير مصرح</span>
    </div>

    <div id="hud-top">
        <div class="hud-card">
            <i data-lucide="satellite" class="hud-icon"></i>
            <div class="hud-val-box">
                <span class="hud-label">الإشارة</span>
                <span id="gps-status" class="hud-main-val">بانتظار GPS</span>
            </div>
        </div>
        <div class="hud-card">
            <i data-lucide="map" class="hud-icon"></i>
            <div class="hud-val-box">
                <span class="hud-label">النطاق الحالي</span>
                <span id="zone-name" class="hud-main-val" style="color: var(--primary)">منطقة آمنة</span>
            </div>
        </div>
        <div class="hud-card">
            <div class="hud-val-box">
                <span class="hud-label">الإحداثيات الجغرافية</span>
                <span id="coords" class="hud-main-val" style="font-size: 14px; direction: ltr;">0.000, 0.000</span>
            </div>
        </div>
        <div class="hud-card" style="justify-content: space-between;">
            <div class="hud-val-box">
                <span class="hud-label">السرعة</span>
                <span class="hud-main-val">كم/ساعة</span>
            </div>
            <div class="speed-gauge">
                <svg class="gauge-svg" viewBox="0 0 80 80">
                    <circle class="gauge-bg" cx="40" cy="40" r="35"></circle>
                    <circle id="speed-ring" class="gauge-progress" cx="40" cy="40" r="35"></circle>
                </svg>
                <div class="speed-text-center" id="speed-val">0</div>
            </div>
        </div>
    </div>

    <div id="search-box">
        <i data-lucide="search" class="search-ic"></i>
        <input type="text" id="destination-input" class="search-input" placeholder="ابحث عن وجهة..." onkeydown="handleSearch(event)">
    </div>

    <div id="nav-card">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <i data-lucide="navigation" style="color: var(--primary)"></i>
            <span style="font-weight: 900; font-size: 18px;">مسار الرحلة</span>
        </div>
        <div id="dest-name" style="opacity: 0.8; font-size: 14px; margin-bottom: 20px; line-height: 1.4;">---</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
            <div><div class="hud-label">المسافة</div><div id="nav-km" style="font-weight: 900; font-size: 18px;">---</div></div>
            <div><div class="hud-label">الزمن</div><div id="nav-min" style="font-weight: 900; font-size: 18px;">---</div></div>
        </div>
    </div>

    <div id="map"></div>
    <div id="vignette"></div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div style="font-size: 60px; margin-bottom: 20px;">🚨</div>
            <h2 id="modal-title" style="margin-bottom: 15px; font-weight: 900;">تحذير أمني</h2>
            <p id="modal-body" style="opacity: 0.8; line-height: 1.6; margin-bottom: 30px;"></p>
            <button onclick="closeModal()" style="background: var(--primary); color: #000; border: none; padding: 12px 40px; border-radius: 12px; font-weight: 900; cursor: pointer;">فهمت، سأنسحب</button>
        </div>
    </div>

    <button id="start-btn" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; background: var(--primary); color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; font-size: 18px; cursor: pointer; box-shadow: 0 10px 40px rgba(0, 242, 255, 0.4);">
        تفعيل النظام
    </button>

    <script>
        let map, userMarker, targetMarker, routePolyline;
        let isAuthorized = false;
        let currentPos = null;
        let lastZone = null;
        let lastAlertTime = 0;

        const zonesData = [
            {
                name: "النطاق الأحمر (منطقة محظورة)",
                color: "#ff3860",
                labelPos: [21.43, 39.81],
                msg: "⚠️ منطقة محضورة أمنيا فقط المصرح لهم بدخول العاصمة المقدسة يمكنهم الدخول لها سيتم ايقاع مخالفة فورية",
                coords: [[20.70150004379111, 39.74547620336583], [20.82109614701648, 39.83809601155372], [20.83942963736666, 39.84817340618953], [20.8436289141557, 39.88789178251207], [21.02580573547771, 39.86988112915366], [21.11647395240314, 39.91435018363975], [21.14557431973176, 39.92299252707362], [21.19564857117273, 39.93972288634575], [21.29405747843474, 40.07104446548749], [21.3377569063467, 40.18661339598307], [21.33695978005598, 40.26586873699659], [21.36126911758232, 40.26786290209701], [21.36168455283478, 40.26832486450851], [21.36176451338503, 40.2686036573539], [21.37087199213354, 40.2658301371425], [21.53723573992467, 40.28466763611192], [21.5523173013468, 40.32672919101677], [21.62142296855228, 40.39035396870963], [21.66275679466926, 40.39890770259256], [21.64208949646057, 40.32718557803213], [21.63451087917093, 40.28680337464734], [21.63501578261253, 40.24523782516165], [21.6305886618192, 40.22316227567907], [21.63097080100261, 40.19113492422682], [21.61833360372991, 40.16815219794162], [21.62129267814695, 40.14394064339548], [21.60978109906645, 40.11092653081775], [21.63933394202724, 40.0948339572515], [21.65891723092306, 40.06808737849082], [21.65693010933428, 40.02307213107491], [21.66898206918071, 39.98939145695884], [21.70502418716606, 39.97247295067518], [21.6856900280856, 39.9288486509768], [21.68192509457498, 39.90646452469439], [21.6924265048853, 39.90049407694579], [21.69239123399441, 39.87165004084191], [21.6778727601981, 39.8580730627732], [21.70943090991979, 39.81698582924813], [21.72405565394661, 39.7876250868062], [21.71546404404157, 39.75733172336524], [21.68219747764469, 39.72714100576981], [21.6318683680729, 39.70122897382493], [21.64195233727379, 39.65644338811498], [21.65409346112042, 39.63051766291512], [21.68237560652928, 39.56142486229131], [21.67555017484882, 39.55920640858917], [21.58857829305702, 39.53085155474616], [21.50537978260742, 39.60099696498023], [21.46255883710861, 39.56051291491933], [21.33755649367083, 39.5516446168989], [21.28248708406367, 39.55816772870512], [21.26014982272355, 39.56232345063864], [21.1619489109048, 39.59882249987461], [21.12437164068065, 39.59234747259856], [21.04247391859231, 39.59018913017329], [20.97934165519455, 39.57148349581971], [20.83352138967588, 39.63960181368336], [20.70150004379111, 39.74547620336583]]
            },
            {
                name: "النطاق البرتقالي (منطقة تنظيمية)",
                color: "#F57C00",
                labelPos: [21.40, 40.18],
                msg: "⚠️ تحذير اخير أنت تقترب من منطقة منظمة أمنيا و مروريا سيتم ايقاع مخالفات فورية عند وصولك للنطاق الاحمر ",
                coords: [[20.98402711391964, 40.20613532007761], [21.26255936858587, 40.40796584894989], [21.46319246084477, 40.5047016780823], [21.63114168312575, 40.46365063993856], [21.66990218212499, 40.48478184745079], [21.72174035851783, 40.48300556775168], [21.81509101032648, 39.91284660561679], [21.81611630115141, 39.88036606724239], [21.82377238543744, 39.82629359477693], [21.82395412209036, 39.81815407082109], [21.82455436304772, 39.80187290614962], [21.75341086205644, 39.55263111353519], [21.60516125046864, 39.49881280333808], [21.18176156176088, 39.53963460610744], [20.96967317014618, 39.5482560914313], [20.68340715846817, 39.70535490369484], [20.76892942543596, 40.02836696499121], [20.98402711391964, 40.20613532007761]]
            },
            {
                name: "النطاق الأصفر (تحذير مبدئي)",
                color: "#FFD700",
                labelPos: [21.20, 39.55],
                msg: "تحذير أنت تقترب من منطقة منظمة أمنيا و مروريا الرجاء توخي الاحاطة و الحذر",
                coords: [[21.95144101986097, 39.79747233590614], [21.94973676349665, 39.78194062900019], [21.94970279523987, 39.76797233797541], [21.94980913420406, 39.75555372101563], [21.94993388245003, 39.74623749553317], [21.94260264331843, 39.71538284511906], [21.93507241988767, 39.70323613827328], [21.92749895364211, 39.69578282772083], [21.91756364666963, 39.68079837559202], [21.91259603855427, 39.67488195021906], [21.90520762063649, 39.66452345298082], [21.89533067926305, 39.65587872182157], [21.88561037636605, 39.64275399274819], [21.86961209118672, 39.62707280416645], [21.86497404095424, 39.62585643246457], [21.85821517320545, 39.62027711230245], [21.76134263428975, 39.46141279626785], [21.56674569393956, 39.4724082128771], [21.4089179339024, 39.44880280178614], [21.23853045583137, 39.47688905951601], [21.1427777605944, 39.50093476452514], [20.80395992402174, 39.55009872902003], [20.64134754766426, 39.70566464474572], [20.74109316617669, 40.05124729923209], [21.03333053156665, 40.4207273266706], [21.68381990064168, 40.873678781964], [21.95144101986097, 39.79747233590614]]
            }
        ];

        function initMap() {
            lucide.createIcons();
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.4, 39.8], 11);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

            zonesData.forEach(z => {
                L.polygon(z.coords, { color: z.color, fillOpacity: 0.15, weight: 2 }).addTo(map);
                L.marker(z.labelPos || z.coords[0], {
                    icon: L.divIcon({ className: 'z-lbl', html: `<div style="color:${z.color}; font-weight:900; font-size:12px; white-space:nowrap; background:rgba(0,0,0,0.6); padding:2px 8px; border-radius:5px;">${z.name}</div>` })
                }).addTo(map);
            });
        }

        function togglePermit() {
            isAuthorized = !isAuthorized;
            const btn = document.getElementById('permit-btn');
            const icon = document.getElementById('permit-icon');
            const text = document.getElementById('permit-text');

            if (isAuthorized) {
                btn.classList.add('authorized');
                icon.setAttribute('data-lucide', 'shield-check');
                icon.style.color = 'var(--primary)';
                text.innerText = 'مصرح له';
                speak("تم تفعيل تصريح الدخول. التنبيهات معطلة.");
            } else {
                btn.classList.remove('authorized');
                icon.setAttribute('data-lucide', 'shield-alert');
                icon.style.color = 'var(--danger)';
                text.innerText = 'غير مصرح';
                speak("تصريح الدخول ملغى. التنبيهات مفعلة.");
            }
            lucide.createIcons();
        }

        async function handleSearch(e) {
            if (e.key === 'Enter') {
                const query = e.target.value;
                if (!query) return;
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                    const data = await res.json();
                    if (data.length > 0) {
                        const coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
                        setDestination(coords, data[0].display_name);
                    }
                } catch (err) { console.error(err); }
            }
        }

        function setDestination(coords, name) {
            if (targetMarker) map.removeLayer(targetMarker);
            targetMarker = L.marker(coords).addTo(map);
            document.getElementById('nav-card').style.display = 'block';
            document.getElementById('dest-name').innerText = name;
            updateRoute(coords);
        }

        async function updateRoute(dest) {
            if (!currentPos) return;
            try {
                const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${currentPos[1]},${currentPos[0]};${dest[1]},${dest[0]}?overview=full&geometries=geojson`);
                const data = await res.json();
                if (data.routes && data.routes[0]) {
                    if (routePolyline) map.removeLayer(routePolyline);
                    routePolyline = L.geoJSON(data.routes[0].geometry, { style: { color: 'var(--primary)', weight: 6, opacity: 0.6 } }).addTo(map);
                    document.getElementById('nav-km').innerText = (data.routes[0].distance / 1000).toFixed(1) + ' كم';
                    document.getElementById('nav-min').innerText = Math.round(data.routes[0].duration / 60) + ' دقيقة';
                }
            } catch (err) { console.error(err); }
        }

        document.getElementById('start-btn').onclick = function() {
            this.style.display = 'none';
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updateTracking, null, { enableHighAccuracy: true });
            }
        };

        function updateTracking(pos) {
            const { latitude, longitude, speed } = pos.coords;
            currentPos = [latitude, longitude];
            
            document.getElementById('coords').innerText = `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
            document.getElementById('gps-status').innerText = "متصل";
            document.getElementById('gps-status').style.color = "var(--primary)";

            // Update Speed Gauge
            const kmh = Math.round((speed || 0) * 3.6);
            document.getElementById('speed-val').innerText = kmh;
            const offset = 220 - (kmh / 160) * 220; // Max speed 160
            document.getElementById('speed-ring').style.strokeDashoffset = Math.max(0, offset);

            if (!userMarker) {
                userMarker = L.marker(currentPos, { icon: L.divIcon({ className: 'user-marker', iconSize: [24, 24] }) }).addTo(map);
                map.setView(currentPos, 15);
            } else {
                userMarker.setLatLng(currentPos);
                map.panTo(currentPos);
            }

            checkZones(latitude, longitude);
        }

        function checkZones(lat, lon) {
            let found = null;
            zonesData.forEach(z => {
                if (isInside(lat, lon, z.coords)) found = z;
            });

            const zoneLabel = document.getElementById('zone-name');
            const body = document.body;

            if (found) {
                zoneLabel.innerText = found.name;
                zoneLabel.style.color = found.color;

                if (!isAuthorized) {
                    body.classList.add('red-alert');
                    if (Date.now() - lastAlertTime > 15000) {
                        showModal(found.name, found.msg);
                        speak(found.msg);
                        lastAlertTime = Date.now();
                    }
                } else {
                    body.classList.remove('red-alert');
                }
            } else {
                zoneLabel.innerText = "منطقة آمنة";
                zoneLabel.style.color = "var(--primary)";
                body.classList.remove('red-alert');
            }
        }

        function isInside(lat, lon, polygon) {
            let x = lat, y = lon;
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                let xi = polygon[i][0], yi = polygon[i][1];
                let xj = polygon[j][0], yj = polygon[j][1];
                let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function showModal(title, body) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = body;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            window.speechSynthesis.speak(utterance);
        }

        initMap();
    </script>
</body>
</html>
